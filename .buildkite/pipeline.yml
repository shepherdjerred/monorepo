agents:
  queue: default

steps:
  - label: ":pipeline: Generate Pipeline"
    command: .buildkite/scripts/generate-pipeline.sh
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=100 --dissociate"
            fetchFlags: --depth=100
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                image: "ghcr.io/shepherdjerred/ci-base:403"
                resources:
                  requests:
                    cpu: "1"
                    memory: "2Gi"
                envFrom:
                  - secretRef:
                      name: buildkite-ci-secrets
                  - secretRef:
                      name: buildkite-argocd-token
                      optional: true
