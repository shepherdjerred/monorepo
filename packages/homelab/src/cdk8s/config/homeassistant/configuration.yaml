default_config:

homekit:
  - name: HA1
    advertise_ip: 192.168.1.81
    port: 21063
    filter:
      include_domains:
        - climate
        - cover
        - fan
        - humidifier
        - alarm_control_panel
        - remote
        - water_heater
        - sensor
        - switch
        - device_tracker
        - binary_sensor
        - input_select
        - vacuum
      exclude_entities:
        - binary_sensor.roomba_bin_full
      exclude_entity_globs:
        - binary_sensor.*_focus
        - binary_sensor.*entertainment_configuration
        - binary_sensor.granary_smart_camera_feeder_*
        - binary_sensor.heat_pump_water_heater_*
        - switch.adaptive_lighting_*
        - sensor.the_victor_229_*
        - sensor.average_*
        - sensor.current_bill*
        - sensor.typical_monthly*
        - sensor.electricity_maps*
        - sensor.refrigerator*
        - binary_sensor.refrigerator*
  - name: HA2
    advertise_ip: 192.168.1.81
    port: 21064
    filter:
      include_domains:
        - light
      exclude_entities:
        - light.living_room_main
        - light.office
  - name: Front Door
    advertise_ip: 192.168.1.81
    port: 21065
    mode: accessory
    filter:
      include_entities:
        - camera.front_door_fluent
    entity_config:
      camera.front_door_fluent:
        support_audio: true
        video_codec: copy
        stream_count: 2
        linked_motion_sensor: binary_sensor.front_door_person
        linked_doorbell_sensor: binary_sensor.front_door_visitor

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 0.0.0.0/0
sonos:
  media_player:
    advertise_addr: 192.168.1.81

recorder:
  commit_interval: 10
  purge_keep_days: 180
  # Exclude entities whose state is either pure noise or trivially recreated
  # from another source. Keeps the 180-day window cheap by not recording data
  # we'd never analyze. Targets the homeassistant-pvc PVC churn (~22 GB/day).
  exclude:
    domains:
      # Weather is rebuilt by the integration on demand; storing 180 days of
      # "Temperature: 72°F at 3:14:23" is high-volume and low-value.
      - weather
    entity_globs:
      # Diagnostic / link-quality metrics — not analytical.
      - sensor.*_signal_strength
      - sensor.*_link_quality
      - sensor.*_linkquality
      - sensor.*_rssi
      # "When did this last update" meta sensors — monotonic timestamps.
      - sensor.*_last_changed
      - sensor.*_last_updated
      - sensor.*_last_seen
      - sensor.*_last_reset
      - sensor.*_last_communication
      - sensor.*_uptime
      # Sun/astronomy is a deterministic function of time + location.
      - sensor.sun_*
    entities:
      - sun.sun
      - sensor.date
      - sensor.time

# Text to speech
tts:
  - platform: google_translate
ffmpeg:

automation: !include automation.yaml
scene: !include scenes.yaml
script: !include scripts.yaml

# Template sensors for monitoring
# Note: Jinja2 templates are escaped for Helm compatibility ({{ "{{" }} ... {{ "}}" }})
template:
  - sensor:
      - name: "Unavailable Entities Count"
        unique_id: unavailable_entities_count
        state: >
          {{ "{{" }} states
             | selectattr('state', 'in', ['unavailable', 'unknown'])
             | rejectattr('domain', 'in', ['group', 'automation', 'scene', 'script', 'button', 'event', 'number', 'select', 'text', 'update'])
             | list | count {{ "}}" }}
        unit_of_measurement: "entities"
        state_class: measurement
        icon: mdi:alert-circle
        attributes:
          entities: >
            {{ "{{" }} states
               | selectattr('state', 'in', ['unavailable', 'unknown'])
               | rejectattr('domain', 'in', ['group', 'automation', 'scene', 'script', 'button', 'event', 'number', 'select', 'text', 'update'])
               | map(attribute='entity_id')
               | list {{ "}}" }}

prometheus:
  namespace: homeassistant

light:
  - platform: group
    name: "Bronze Lamp"
    unique_id: bronze_lamp
    entities:
      - light.bronze_lamp_upper
      - light.bronze_lamp_lower
      - light.bronze_lamp_middle
  - platform: group
    name: "R&B Lamp"
    unique_id: r_b_lamp
    entities:
      - light.room_and_board_1
      - light.room_and_board_2
