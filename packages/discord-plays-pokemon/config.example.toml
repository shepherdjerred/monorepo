# Follow the setup guide to configure this file: https://docs.discord-plays-pokemon.com/user/
# Most of these settings should not be changed by most users

# the Discord server ID that you want to connect to
server_id = ""

[bot]
# should the Discord bot component be enabled
enabled = true
# your Discord bot's token
discord_token = ""
# your Discord bot's application ID
application_id = ""

[bot.commands]
# should slash commands be enabled
enabled = true
# controls whether or not commands should be registered at startup
update = true

[bot.commands.screenshot]
# should screenshot be enabled
enabled = true

[bot.notifications]
# should the bot send notifications
enabled = true
channel_id = ""

# In-game event notifications (faints, badges, evolutions, catches, ...).
# Detected by polling emulator memory and diffing snapshots. All keys are
# optional with the defaults shown below.
[bot.notifications.events]
# master switch for the feature
enabled = true
# "log" = shadow mode (detect + log + count, send nothing to Discord),
# "send" = post embeds to the notifications channel above
mode = "send"
# how often to poll game memory (30 frames ≈ 0.5s at ~60fps)
poll_interval_frames = 30
# attach a screenshot of the moment to each notification
attach_screenshot = true
# per-event toggles
faint = true
badge = true
evolution = true
catch = true
whiteout = true
level_up = true
dex_entry = true

[stream]
# should the bot stream video to Discord
enabled = true
# the Discord video channel ID to stream to
channel_id = ""
# only stream if there is someone in the channel
dynamic_streaming = true
# there must be at least this many people watching
# for commands to be processed
minimum_in_channel = 2
# only those watching the stream can send commands
require_watching = true
# User IDs of peer userbots that share this voice channel (Glitter Kart,
# Streambot, ...). Peer userbots are real Discord user accounts, so without
# this list they'd be counted as real viewers and this bot would never leave.
peer_userbot_ids = []

[stream.userbot]
# the Discord user ID of the account that will stream video
id = ""
# Discord user (selfbot) token for the streaming account. Required because
# Discord blocks video from bot tokens. Treat this as a secret.
token = ""

[stream.video]
# 16:9 output canvas height (-> 1280x720); the 3:2 game is pillarboxed onto black
canvas_height = 720
# frames per second sent to Discord (30 for non-Nitro accounts)
frame_rate = 30
bitrate_kbps = 1500
bitrate_max_kbps = 4000
# VAAPI h264 on an Intel iGPU; also enableable via STREAM_HARDWARE_ACCELERATION env
hardware_acceleration = false
vaapi_device = "/dev/dri/renderD128"

[game]
# should the emulator + game components be enabled
enabled = true
# path to the built pokeemerald.wasm (run `bun scripts/fetch-wasm.ts`)
wasm_path = "packages/backend/assets/pokeemerald.wasm"
# optional path for the persisted 128 KiB flash save
save_path = "saves/pokeemerald.flash"

[game.goal]
# enable Codex goal mode and the /goal slash command
enabled = false
# runtime must provide CODEX_API_KEY, CODEX_ACCESS_TOKEN, OPENAI_API_KEY, or a mounted Codex auth cache.
# NOTE: gpt-5.4-nano requires API-key auth — Codex with a ChatGPT-account session 400s
# with "The 'gpt-5.4-nano' model is not supported when using Codex with a ChatGPT account".
# lower-cost model used by the long-running Codex loop
model = "gpt-5.4-nano"
codex_binary = "codex"
# Codex runs from this directory; screenshots/state paths are relative to it
runtime_directory = "."
screenshot_dir = "goal-screenshots"
state_path = "goal-state.json"
control_host = "127.0.0.1"
control_port = 8082
# hard cap; schema rejects values above 30
max_runtime_minutes = 30
# another user can replace the goal after this lock expires
lock_minutes = 5
progress_update_interval_seconds = 60

[game.commands]
# should chat commands be enabled
# these chat commands are how the game is normally played
enabled = true
# the Discord text channel ID to listen for commands
channel_id = ""
max_actions_per_command = 20
max_quantity_per_action = 10
key_press_duration_in_milliseconds = 15
delay_between_actions_in_milliseconds = 5

[game.commands.burst]
duration_in_milliseconds = 15
delay_in_milliseconds = 5
quantity = 3

[game.commands.chord]
duration_in_milliseconds = 15
max_commands = 10
max_total = 10
delay = 5

[game.commands.hold]
duration_in_milliseconds = 150

[web]
# enable the built-in webserver
enabled = true
# enable cors
cors = true
# the port to run the webserver on
port = 8081
# the path to the UI assets, such as the emulator page and web UI
assets = "packages/frontend/dist/"

[web.api]
# should the web API be enabled
enabled = true
