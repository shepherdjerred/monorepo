# Static Buildkite pipeline — no generator. PR lanes use Buildkite's native
# `if_changed`; main lanes use the fail-open, dependency-free ci-changed.sh
# selector against the last green main commit before installing dependencies.
#
# Invariant (scope-creep guard): verify is the only full-root install. Other
# lanes use filtered installs or no install, and validate-pipeline.ts enforces
# that boundary together with step-key pod attribution. Runtime commands use
# `bun --no-install` so a fresh pod cannot trigger Bun's implicit auto-install.

agents:
  queue: default

# Every step runs in the toolchain image baked from .mise.toml
# (.buildkite/ci-image) — same tool versions as every laptop.
# Steps that run repo tasks start with `. .buildkite/scripts/toolchain.sh`
# — a fast no-op on a current image, a runtime mise bootstrap on a stale one.
common:
  - pod: &pod
      kubernetes: &pod_kubernetes
        checkout:
          # Full clone: turbo --affected needs the merge-base with main.
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              # :latest is mutable and the ci-image refresh step repushes it;
              # the k8s default IfNotPresent pinned pods to a stale node-cached
              # image (build 5648: release step lacked the claude CLI baked
              # into the current image).
              imagePullPolicy: Always
              env:
                # kubernetes-bootstrap runs step commands via /bin/sh by
                # default — dash on the debian ci-base, which rejects
                # toolchain.sh's `set -o pipefail` (build 5651).
                - name: BUILDKITE_SHELL
                  value: "/bin/bash -e -c"
              resources:
                requests: { cpu: "2", memory: "4Gi" }
                limits: { cpu: "7", memory: "12Gi" }
              volumeMounts:
                # Checkouts are mirror-backed (default-checkout-params.gitMirrors):
                # .git/objects/info/alternates points into this volume, so every
                # container that runs git (turbo hashing, go VCS stamping —
                # build 5694) needs the mirror mounted, not just the checkout
                # container. The agent stack adds the pod-level volume.
                - name: buildkite-git-mirrors
                  mountPath: /buildkite/git-mirrors
                  readOnly: true
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
  - pod_privileged: &pod_privileged
      kubernetes: &pod_privileged_kubernetes
        checkout:
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              # Same stale-:latest guard as the base pod above.
              imagePullPolicy: Always
              env:
                - name: DOCKER_HOST
                  value: "tcp://127.0.0.1:2375"
                # Same dash-vs-bash guard as the base pod above (build 5651).
                - name: BUILDKITE_SHELL
                  value: "/bin/bash -e -c"
              resources:
                requests: { cpu: "2", memory: "6Gi" }
                limits: { cpu: "7", memory: "14Gi" }
              volumeMounts:
                # Checkouts are mirror-backed (default-checkout-params.gitMirrors):
                # .git/objects/info/alternates points into this volume, so every
                # container that runs git (turbo hashing, go VCS stamping —
                # build 5694) needs the mirror mounted, not just the checkout
                # container. The agent stack adds the pod-level volume.
                - name: buildkite-git-mirrors
                  mountPath: /buildkite/git-mirrors
                  readOnly: true
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
          # Docker daemon for image builds + compose e2e, as a NATIVE SIDECAR
          # (initContainer + restartPolicy Always): kubelet terminates it by
          # itself once the regular containers finish, so pod completion never
          # depends on the agent-stack controller's Job-reap update. As a
          # regular container it zombied: the reap raced a kyverno/kueue
          # webhook outage (failurePolicy=Fail rejected the update) and the
          # finished pod held ~4 CPU/10Gi of Kueue quota for 2.5h, starving
          # the whole queue (2026-07-18; same freeze signature as 07-05/08).
          # Steps source .buildkite/scripts/docker-env.sh (CLI bootstrap +
          # daemon wait).
          initContainers:
            - name: dind
              # renovate: datasource=docker depName=docker
              image: "docker:28-dind"
              restartPolicy: Always
              securityContext: { privileged: true }
              env:
                - name: DOCKER_TLS_CERTDIR
                  value: ""
              resources:
                requests: { cpu: "1", memory: "2Gi" }
                limits: { cpu: "4", memory: "8Gi" }
  # Light steps: thin deploy/publish/annotate scripts whose work is seconds
  # even on a cold cache. Small REQUESTS so Kueue admits them alongside the
  # long images job (7.5 CPU / 16Gi namespace quota — build 5644: light steps
  # sat runnable 3-66 min behind it); limits stay high so a cold-cache burst
  # still gets real CPU. Steps that do heavy work when cold (verify, e2e,
  # images, site builds' turbo graph) keep the full-size pod.
  - pod_light: &pod_light
      kubernetes: &pod_light_kubernetes
        checkout:
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              imagePullPolicy: Always
              env:
                - name: BUILDKITE_SHELL
                  value: "/bin/bash -e -c"
              resources:
                requests: { cpu: "500m", memory: "1Gi" }
                limits: { cpu: "7", memory: "12Gi" }
              volumeMounts:
                # Checkouts are mirror-backed (default-checkout-params.gitMirrors):
                # .git/objects/info/alternates points into this volume, so every
                # container that runs git (turbo hashing, go VCS stamping —
                # build 5694) needs the mirror mounted, not just the checkout
                # container. The agent stack adds the pod-level volume.
                - name: buildkite-git-mirrors
                  mountPath: /buildkite/git-mirrors
                  readOnly: true
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
  - retry: &retry
      automatic:
        # Transient infra failures only; logical failures (1, 3) never retry.
        # 34 is the script-declared transient code: CI scripts that talk to
        # external services classify failures via scripts/lib/transient.ts and
        # exit 34 when the error matches a known transient signature
        # (5xx, network, GitHub GraphQL 500), so only retryable failures retry.
        - exit_status: 255
          limit: 2
        - exit_status: 34
          limit: 2
        - exit_status: -1
          limit: 2

env:
  TURBO_SCM_BASE: "origin/main"
  TURBO_TELEMETRY_DISABLED: "1"
  # Remote cache (ducktors/turborepo-remote-cache, R2-backed). CI pods run
  # in-cluster, so they hit the Service directly instead of the Tailscale
  # ingress developer machines use. TURBO_TOKEN comes from the
  # buildkite-ci-secrets envFrom; turbo leaves remote caching disabled until
  # all three of API/TEAM/TOKEN are present, so a missing token degrades to
  # local-cache-only rather than failing the build.
  TURBO_API: "http://turbo-cache-turbo-cache-service.turbo-cache.svc.cluster.local:3000"
  TURBO_TEAM: "monorepo"

steps:
  # ── Release-please PR auto-skip ──────────────────────────────────────────
  # Webhook builds of release-please's own PR (branch
  # release-please--branches--main) are no-op version bumps; every step
  # carries the guard below so the build uploads zero jobs instead of burning
  # the full pipeline (the old generator's shouldSkipReleasePleasePrBuild,
  # restored). Deliberately narrow: only build.source == "webhook" skips — a
  # manual New Build (ui/api/schedule/trigger_job) runs full CI, and
  # RUN_RELEASE_CI=true forces a run regardless. The empty build still passes
  # (the pipeline-upload step always runs), so the aggregate
  # buildkite/monorepo/pr required status goes green and the release PR stays
  # mergeable. The guard is AND-ed with each step's own condition:
  #   build.branch != "release-please--branches--main"
  #     || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"

  # Resolve the last green main commit once in a small toolchain pod. Main
  # lanes consume the result through Buildkite metadata before they start any
  # install or heavyweight runtime image. A lookup failure is intentionally a
  # soft failure: the consumers then fail open and run instead of skipping.
  - label: ":mag_right: select main CI work"
    key: ci-selector-base
    if: build.branch == pipeline.default_branch
    soft_fail: true
    timeout_in_minutes: 2
    command: bash .buildkite/scripts/prepare-ci-changed-base.sh
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: ci-selector-base

  # ── Verify: the whole task graph + every repo check ──────────────────────
  # PRs run affected-scoped; main re-verifies EVERYTHING (cheap via cache).
  # The turbo run summary is annotated onto the build either way, without
  # masking verify's exit code.
  - label: ":turborepo: verify"
    key: verify
    if: (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    depends_on: ci-selector-base
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun --no-install .buildkite/scripts/validate-pipeline.ts
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      if [ "$BUILDKITE_BRANCH" = "main" ]; then SCOPE=""; else SCOPE="--affected"; fi
      set +e
      bun --no-install run verify -- $$SCOPE --filter='!sjer.red' --filter='!@shepherdjerred/resume' --concurrency=6 --output-logs=errors-only --summarize
      verify_status=$?
      set -e
      bun --no-install scripts/annotate-turbo-summary.ts
      if [ "$$verify_status" -eq 0 ]; then
        bun --no-install packages/homelab/src/cdk8s/scripts/generate-caddyfile.ts caddyfile.generated
      fi
      exit "$$verify_status"
    artifact_paths:
      - "caddyfile.generated"
      - "packages/homelab/src/cdk8s/dist/**/*"
      - "packages/homelab/src/cdk8s/dist/*"
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_privileged_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: verify

  # PR change filters include the global CI/toolchain closure. A selector
  # mistake can therefore only run extra work; it cannot hide changes to the
  # machinery that decides or executes a lane.
  - label: ":performing_arts: playwright e2e (PR)"
    key: playwright-e2e-pr
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "packages/sjer.red/**"
        - "packages/astro-opengraph-images/**"
        - "packages/webring/**"
        - "packages/eslint-config/**"
    cancel_on_build_failing: true
    command: |
      apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip
      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
      export PATH="/root/.bun/bin:$$PATH"
      bun install --frozen-lockfile --filter sjer.red
      cd packages/sjer.red && bunx playwright install && cd ../..
      bunx turbo@2.10.4 run build typecheck lint test test:e2e --filter=sjer.red --concurrency=2
    retry: *retry
    plugins:
      - kubernetes:
          metadata:
            labels:
              ci.sjer.red/step-key: playwright-e2e-pr
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=mcr.microsoft.com/playwright
                image: "mcr.microsoft.com/playwright:v1.61.1-noble"
                resources:
                  requests: { cpu: "2", memory: "4Gi" }
                  limits: { cpu: "4", memory: "8Gi" }
                volumeMounts:
                  # Mirror-backed checkouts: see the container-0 mounts in the
                  # shared pod anchors (turbo runs git in these containers).
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  - label: ":performing_arts: playwright e2e (main)"
    key: playwright-e2e-main
    if: build.branch == pipeline.default_branch
    depends_on: ci-selector-base
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh playwright; then exit 0; fi
      apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip
      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
      export PATH="/root/.bun/bin:$$PATH"
      bun install --frozen-lockfile --filter sjer.red
      cd packages/sjer.red && bunx playwright install && cd ../..
      bunx turbo@2.10.4 run build typecheck lint test test:e2e --filter=sjer.red --concurrency=2
    artifact_paths:
      - "packages/sjer.red/dist/**/*"
      - "packages/sjer.red/dist/*"
    retry: *retry
    plugins:
      - kubernetes:
          metadata:
            labels:
              ci.sjer.red/step-key: playwright-e2e-main
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=mcr.microsoft.com/playwright
                image: "mcr.microsoft.com/playwright:v1.61.1-noble"
                resources:
                  requests: { cpu: "2", memory: "4Gi" }
                  limits: { cpu: "4", memory: "8Gi" }
                volumeMounts:
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  - label: ":scroll: resume build (PR)"
    key: resume-build-pr
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "packages/resume/**"
    cancel_on_build_failing: true
    command: |
      export PATH="$(dirname "$(find /usr/local/texlive -name xelatex | head -1)"):$$PATH"
      cd packages/resume
      xelatex resume.tex
    artifact_paths: "packages/resume/*.pdf"
    retry: *retry
    plugins:
      - kubernetes:
          metadata:
            labels:
              ci.sjer.red/step-key: resume-build-pr
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=texlive/texlive
                image: "texlive/texlive:TL2024-historic"
                resources:
                  requests: { cpu: "1", memory: "2Gi" }
                  limits: { cpu: "2", memory: "4Gi" }
                volumeMounts:
                  # Mirror-backed checkouts: see the container-0 mounts in the
                  # shared pod anchors (turbo runs git in these containers).
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  - label: ":scroll: resume build (main)"
    key: resume-build-main
    if: build.branch == pipeline.default_branch
    depends_on: ci-selector-base
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh resume; then exit 0; fi
      export PATH="$(dirname "$(find /usr/local/texlive -name xelatex | head -1)"):$$PATH"
      cd packages/resume
      xelatex resume.tex
    artifact_paths: "packages/resume/*.pdf"
    retry: *retry
    plugins:
      - kubernetes:
          metadata:
            labels:
              ci.sjer.red/step-key: resume-build-main
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=texlive/texlive
                image: "texlive/texlive:TL2024-historic"
                resources:
                  requests: { cpu: "1", memory: "2Gi" }
                  limits: { cpu: "2", memory: "4Gi" }
                volumeMounts:
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  # ── Helm value types drift gate (PR-only). The committed
  # packages/homelab/src/cdk8s/generated/helm types must be regenerated in the
  # same PR that changes a generator input. Replaces the deleted freshness
  # mechanisms (helm-types-weekly-refresh Temporal schedule → #1168 Dagger
  # gate → lost in the Buildkite replatform #1516). Accepted trade-off:
  # Renovate chart bumps touching versions.ts fail here until someone pushes
  # the regen commit (--check prints the command; hosted Renovate cannot run
  # it). Main is skipped: inputs are fully version-pinned, so a green PR gate
  # implies a green main tree. helm comes from the ci-image's mise toolchain.
  - label: ":helm: helm types drift check"
    key: helm-types-drift-check
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "packages/homelab/src/cdk8s/src/versions.ts"
        - "packages/homelab/src/cdk8s/scripts/generate-helm-types.ts"
        - "packages/homelab/src/cdk8s/scripts/parse-helm-charts.ts"
        - "packages/homelab/src/helm-types/**"
        - "packages/homelab/src/cdk8s/generated/helm/**"
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter '@homelab/cdk8s'
      cd packages/homelab/src/cdk8s
      bun --no-install run generate-helm-types --check
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: helm-types-drift-check

  - label: ":docker: docker e2e (PR)"
    key: docker-e2e-pr
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "packages/llm-observability/**"
        - "packages/eslint-config/**"
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile --filter '@shepherdjerred/llm-observability'
      bun --no-install run --cwd packages/llm-observability test:e2e
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_privileged_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: docker-e2e-pr

  - label: ":docker: docker e2e (main)"
    key: docker-e2e-main
    if: build.branch == pipeline.default_branch
    depends_on: ci-selector-base
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh docker-e2e; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile --filter '@shepherdjerred/llm-observability'
      bun --no-install run --cwd packages/llm-observability test:e2e
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_privileged_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: docker-e2e-main

  # Findings are soft; scanner/runtime failures are hard. Both scanners are PR
  # only and use native path filters so unchanged code never starts a pod.
  - label: ":shield: trivy"
    key: trivy
    soft_fail:
      - exit_status: 7
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "**/bun.lock"
        - "bunfig.toml"
        - ".trivyignore"
        - "package.json"
        - "packages/**/package.json"
        - "**/package-lock.json"
        - "**/pnpm-lock.yaml"
        - "**/yarn.lock"
        - "**/go.mod"
        - "**/go.sum"
        - "**/Cargo.lock"
        - "**/Cargo.toml"
        - "**/Podfile.lock"
        - "**/Package.resolved"
        - "**/requirements*.txt"
        - "**/Pipfile"
        - "**/Pipfile.lock"
        - "**/poetry.lock"
        - "**/uv.lock"
        - "**/pom.xml"
        - "**/build.gradle"
        - "**/build.gradle.kts"
        - "**/*.csproj"
        - "Dockerfile"
        - "**/Dockerfile"
        - "**/Dockerfile.*"
        - "patches/**"
        - "turbo.json"
      # sandbox is personal scratch and frozen legacy code; it is not shipped.
      # Do not start a scanner pod for changes that only touch that tree.
      exclude: "sandbox/**"
    cancel_on_build_failing: true
    # Excluding unshipped scratch also avoids traversing and resolving the
    # archived Maven graphs on every scan (build 5980 exhausted Maven Central's
    # shared-IP rate limit while resolving sandbox/archive/castle-casters).
    command: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 7 --skip-dirs node_modules --skip-dirs sandbox .
    plugins:
      - kubernetes:
          metadata:
            labels:
              ci.sjer.red/step-key: trivy
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            containers:
              # The shell is taken from the AGENT container's registration
              # env (container-0-level BUILDKITE_SHELL is ignored — the
              # build-5651 lesson). This image has no bash; use sh.
              - name: agent
                env:
                  - name: BUILDKITE_SHELL
                    value: "/bin/sh -e -c"
              - name: container-0
                # renovate: datasource=docker depName=aquasec/trivy
                image: "aquasec/trivy:0.72.0"
                securityContext:
                  allowPrivilegeEscalation: false
                # The Trivy image has /bin/sh but no /bin/bash. The agent's
                # default bash shell otherwise fails before Trivy can start.
                env:
                  - name: BUILDKITE_SHELL
                    value: "/bin/sh -e -c"
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }
                  limits: { cpu: "2", memory: "4Gi" }

  - label: ":mag: semgrep"
    key: semgrep
    soft_fail:
      - exit_status: 1
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "Dockerfile"
        - "**/Dockerfile"
        - "**/Dockerfile.*"
        - "**/*.astro"
        - "**/*.c"
        - "**/*.cjs"
        - "**/*.clj"
        - "**/*.cljs"
        - "**/*.cls"
        - "**/*.cs"
        - "**/*.cpp"
        - "**/*.css"
        - "**/*.dart"
        - "**/*.ex"
        - "**/*.exs"
        - "**/*.h"
        - "**/*.hcl"
        - "**/*.hpp"
        - "**/*.hs"
        - "**/*.html"
        - "**/*.go"
        - "**/*.java"
        - "**/*.jl"
        - "**/*.js"
        - "**/*.json"
        - "**/*.jsonnet"
        - "**/*.jsx"
        - "**/*.kt"
        - "**/*.kts"
        - "**/*.lua"
        - "**/*.lisp"
        - "**/*.m"
        - "**/*.ml"
        - "**/*.mli"
        - "**/*.mjs"
        - "**/*.mm"
        - "**/*.php"
        - "**/*.py"
        - "**/*.proto"
        - "**/*.r"
        - "**/*.rb"
        - "**/*.rs"
        - "**/*.scss"
        - "**/*.scala"
        - "**/*.scm"
        - "**/*.sh"
        - "**/*.sol"
        - "**/*.svelte"
        - "**/*.sql"
        - "**/*.swift"
        - "**/*.tf"
        - "**/*.ts"
        - "**/*.cts"
        - "**/*.mts"
        - "**/*.tsx"
        - "**/*.vue"
        - "**/*.yaml"
        - "**/*.yml"
    cancel_on_build_failing: true
    # Excludes mirror the .gitleaks.toml allowlist: these paths hold values
    # already triaged as non-sensitive (legacy/undeployed sandbox archive,
    # a disabled Minecraft management-server secret, a public Firebase web
    # apiKey). semgrep's generic-secret rule would otherwise re-print those
    # values into the log on every build. Real code stays fully scanned.
    command: |
      if ! base=$(git merge-base origin/main HEAD); then
        echo "semgrep could not resolve the PR merge-base" >&2
        exit 2
      fi
      semgrep scan --config auto --error \
        --baseline-commit "$$base" \
        --exclude sandbox \
        --exclude server.properties \
        --exclude fetcher.ts \
        .
    plugins:
      - kubernetes:
          metadata:
            labels:
              ci.sjer.red/step-key: semgrep
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            containers:
              # The shell is taken from the AGENT container's registration
              # env (container-0-level BUILDKITE_SHELL is ignored — the
              # build-5651 lesson). This image has no bash; use sh.
              - name: agent
                env:
                  - name: BUILDKITE_SHELL
                    value: "/bin/sh -e -c"
              - name: container-0
                # renovate: datasource=docker depName=semgrep/semgrep
                image: "semgrep/semgrep:1.170.0"
                securityContext:
                  allowPrivilegeEscalation: false
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }
                  limits: { cpu: "2", memory: "4Gi" }
                volumeMounts:
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true

  # Blocking, like the old pipeline (greptileReviewStep sat in blockingGates
  # and fed the required check): every non-outdated Greptile review thread on
  # the PR must be resolved before the aggregate buildkite/monorepo/pr
  # required status can go green. wait-for-greptile.ts polls only while
  # Greptile is still reviewing the head commit, then fails fast with the
  # unresolved-thread list.
  - label: ":robot_face: greptile review gate"
    key: greptile-review
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter '@shepherdjerred/root-scripts' --production
      bun --no-install scripts/wait-for-greptile.ts
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: greptile-review

  # ── PR-only dry-run lane: validate every deploy path, no side effects ─────
  # (the old pipeline's --dryrun plumbing, restored)
  - label: ":terraform: tofu plan"
    key: tofu-plan
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "packages/homelab/src/tofu/**"
        - "packages/homelab/scripts/tofu-stack.ts"
        - "scripts/lib/run.ts"
        - "scripts/lib/transient.ts"
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      for stack in seaweedfs tailscale buildkite arr pagerduty github cloudflare; do
        bun --no-install packages/homelab/scripts/tofu-stack.ts "$$stack" plan
      done
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: tofu-plan

  - label: ":docker: images — build + smoke (PR dry-run)"
    key: images-pr
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".dockerignore"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "docker-bake.hcl"
        - "package.json"
        - "packages/**/package.json"
        - "scripts/package.json"
        - "patches/**"
        - "turbo.json"
        - "tsconfig.base.json"
        - "packages/birmel/**"
        - "packages/discord-plays-core/**"
        - "packages/discord-plays-mario-kart/**"
        - "packages/discord-plays-pokemon/**"
        - "packages/discord-stream-lifecycle/**"
        - "packages/discord-video-stream/**"
        - "packages/eslint-config/**"
        - "packages/home-assistant/**"
        - "packages/homelab/images/**"
        - "packages/homelab/scripts/smoke-images.ts"
        - "packages/homelab/src/cdk8s/scripts/generate-caddyfile.ts"
        - "packages/homelab/src/cdk8s/src/misc/common.ts"
        - "packages/homelab/src/cdk8s/src/misc/s3-static-site.ts"
        - "packages/homelab/src/cdk8s/src/resources/s3-static-sites/sites.ts"
        - "packages/llm-models/**"
        - "packages/llm-observability/**"
        - "packages/scout-for-lol/packages/backend/**"
        - "packages/scout-for-lol/packages/data/**"
        - "packages/scout-for-lol/packages/report/**"
        - "packages/scout-for-lol/tsconfig.base.json"
        - "packages/starlight-karma-bot/**"
        - "packages/streambot/**"
        - "packages/tasknotes-server/**"
        - "packages/tasknotes-types/**"
        - "packages/temporal/**"
        - "packages/toolkit/**"
        - "packages/trmnl-dashboard/**"
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      buildkite-agent artifact download "caddyfile.generated" /tmp --step verify
      # Affected-scoped parallel bake + smoke, no push, cache read-only
      # (PUSH_CACHE stays false — only main writes the buildcache refs).
      # Rehearses exactly the path main runs, including the --load transfer.
      CADDYFILE_SMOKE_PATH=/tmp/caddyfile.generated bash .buildkite/scripts/bake-images.sh --affected
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_privileged_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: images-pr

  - label: ":rocket: sites (PR dry-run)"
    key: sites-pr
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "packages/sjer.red/**"
        - "packages/resume/**"
        - "packages/webring/**"
        - "packages/astro-opengraph-images/**"
        - "packages/llm-models/**"
        - "packages/cooklang-rich-preview/**"
        - "packages/stocks-sjer-red/**"
        - "packages/better-skill-capped/**"
        - "packages/glitter/**"
        - "packages/scout-for-lol/**"
        - "packages/homelab/src/cdk8s/src/versions.ts"
        - "scripts/deploy-site.ts"
        - "scripts/scout-site-release.ts"
        - "scripts/promote-scout.ts"
        - "scripts/lib/**"
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter '@shepherdjerred/root-scripts' --production
      for site in sjer.red resume webring cooklang-rich-preview stocks-sjer-red better-skill-capped glitter; do
        bun --no-install scripts/deploy-site.ts "$$site" --dry-run
      done
      # Scout sites deploy versioned + stage-pinned (not via the catalog);
      # rehearse all three subcommands so PRs exercise the real main path.
      bun --no-install scripts/scout-site-release.ts archive --version "2.0.0-$BUILDKITE_BUILD_NUMBER" --dry-run
      bun --no-install scripts/scout-site-release.ts deploy-beta --version "2.0.0-$BUILDKITE_BUILD_NUMBER" --dry-run
      bun --no-install scripts/scout-site-release.ts reconcile-prod --dry-run
      bun --no-install scripts/promote-scout.ts --ci --site-version "2.0.0-$BUILDKITE_BUILD_NUMBER" --dry-run
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: sites-pr

  - label: ":helm: helm push (PR dry-run)"
    key: helm-pr
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "patches/**"
        - "turbo.json"
        - "packages/homelab/src/cdk8s/**"
        - "packages/homelab/scripts/helm-push.ts"
        - "scripts/lib/run.ts"
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun --no-install packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER" --dry-run
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: helm-pr

  - label: ":package: release (PR dry-run)"
    key: release-pr
    if: build.pull_request.id != null && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    if_changed:
      include:
        - ".buildkite/**"
        - ".mise.toml"
        - "bun.lock"
        - "bunfig.toml"
        - "package.json"
        - "packages/**/package.json"
        - "patches/**"
        - "release-please-config.json"
        - ".release-please-manifest.json"
        - "scripts/release.ts"
        - "scripts/lib/**"
        - "turbo.json"
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun --no-install scripts/release.ts --dry-run
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: release-pr

  # ── Main-only: images (parallel bake + smoke + push) ─────────────────────
  - label: ":docker: images — build, smoke, push"
    key: images
    if: build.branch == pipeline.default_branch
    depends_on: verify
    cancel_on_build_failing: true
    concurrency: 1
    concurrency_group: monorepo/image-push
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh images; then
        jq -n '{}' | buildkite-agent meta-data set image-digests
        exit 0
      fi
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      buildkite-agent artifact download "caddyfile.generated" /tmp --step verify
      CADDYFILE_SMOKE_PATH=/tmp/caddyfile.generated bash .buildkite/scripts/bake-images.sh --push
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_privileged_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: images

  # ── Main-only: static sites ───────────────────────────────────────────────
  - label: ":rocket: deploy sites"
    key: sites
    if: build.branch == pipeline.default_branch
    depends_on: [verify, playwright-e2e-main, resume-build-main]
    cancel_on_build_failing: true
    concurrency: 1
    concurrency_group: monorepo/site-deploys
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh sites; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      filters=()
      site_sjer=false
      site_resume=false
      site_webring=false
      site_cooklang=false
      site_stocks=false
      site_better_skill_capped=false
      site_glitter=false
      site_scout=false
      if bash .buildkite/scripts/ci-changed.sh site-sjer-red; then
        site_sjer=true
      fi
      if bash .buildkite/scripts/ci-changed.sh site-resume; then site_resume=true; fi
      if bash .buildkite/scripts/ci-changed.sh site-webring; then
        site_webring=true
        filters+=(--filter webring)
      fi
      if bash .buildkite/scripts/ci-changed.sh site-cooklang; then
        site_cooklang=true
        filters+=(--filter '@shepherdjerred/cooklang-rich-preview')
      fi
      if bash .buildkite/scripts/ci-changed.sh site-stocks; then
        site_stocks=true
        filters+=(--filter stocks-sjer-red)
      fi
      if bash .buildkite/scripts/ci-changed.sh site-better-skill-capped; then
        site_better_skill_capped=true
        filters+=(--filter better-skill-capped)
      fi
      if bash .buildkite/scripts/ci-changed.sh site-glitter; then
        site_glitter=true
      fi
      if bash .buildkite/scripts/ci-changed.sh site-scout; then
        site_scout=true
        filters+=(--filter '@scout-for-lol/frontend')
        filters+=(--filter '@scout-for-lol/app')
        filters+=(--filter astro-opengraph-images)
        filters+=(--filter '@shepherdjerred/llm-models')
        bun install --frozen-lockfile --filter '@shepherdjerred/root-scripts' --production
      fi
      if [ "$${#filters[@]}" -gt 0 ]; then
        bun install --frozen-lockfile "$${filters[@]}"
      fi
      # Site syncs push to SeaweedFS S3 — same credential mapping as the
      # tofu steps (the secret exposes SEAWEEDFS_*, the AWS CLI wants AWS_*).
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      if $$site_sjer; then
        buildkite-agent artifact download "packages/sjer.red/dist/**/*" . --step playwright-e2e-main
        buildkite-agent artifact download "packages/sjer.red/dist/*" . --step playwright-e2e-main
        bun --no-install scripts/deploy-site.ts sjer.red --prebuilt
      fi
      if $$site_resume; then
        buildkite-agent artifact download "packages/resume/resume.pdf" . --step resume-build-main
        bun --no-install scripts/deploy-site.ts resume --prebuilt
      fi
      if $$site_webring; then bun --no-install scripts/deploy-site.ts webring; fi
      if $$site_cooklang; then bun --no-install scripts/deploy-site.ts cooklang-rich-preview; fi
      if $$site_stocks; then bun --no-install scripts/deploy-site.ts stocks-sjer-red; fi
      if $$site_better_skill_capped; then bun --no-install scripts/deploy-site.ts better-skill-capped; fi
      if $$site_glitter; then bun --no-install scripts/deploy-site.ts glitter; fi
      if $$site_scout; then
        bun --no-install run --cwd packages/llm-models build
        bun --no-install run --cwd packages/astro-opengraph-images build
        bun --no-install scripts/scout-site-release.ts archive --version "2.0.0-$BUILDKITE_BUILD_NUMBER"
        bun --no-install scripts/scout-site-release.ts deploy-beta --version "2.0.0-$BUILDKITE_BUILD_NUMBER"
      fi
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: sites

  # ── Main-only: npm publishes ──────────────────────────────────────────────
  # Two lanes, matching the old pipeline's npm-publish-all-prod/-dev pair:
  # the prod lane publishes package.json versions to --tag latest (idempotent
  # via --tolerate-republish, so it's a no-op except on the build after a
  # release-please merge bumps versions); the dev lane then publishes
  # <version>-dev.<build#> to --tag dev on every main build. Prod runs FIRST;
  # dev mode rewrites package.json versions mid-publish (and restores them in
  # a finally, so a failed dev publish can't leak -dev.N into a later prod run).
  - label: ":npm: publish packages"
    key: npm-publish
    if: build.branch == pipeline.default_branch
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh npm; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile \
        --filter astro-opengraph-images \
        --filter webring \
        --filter '@shepherdjerred/helm-types'
      bun --no-install run --cwd packages/astro-opengraph-images publish:npm
      bun --no-install run --cwd packages/webring publish:npm
      bun --no-install run --cwd packages/homelab/src/helm-types publish:npm
      bun --no-install scripts/publish-npm.ts packages/astro-opengraph-images --dev-suffix "$BUILDKITE_BUILD_NUMBER"
      bun --no-install scripts/publish-npm.ts packages/webring --dev-suffix "$BUILDKITE_BUILD_NUMBER"
      bun --no-install scripts/publish-npm.ts packages/homelab/src/helm-types --dev-suffix "$BUILDKITE_BUILD_NUMBER"
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: npm-publish

  # ── Main-only: homelab release track ─────────────────────────────────────
  - label: ":helm: helm push"
    key: helm-push
    if: build.branch == pipeline.default_branch
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh helm; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      buildkite-agent artifact download "packages/homelab/src/cdk8s/dist/**/*" . --step verify
      buildkite-agent artifact download "packages/homelab/src/cdk8s/dist/*" . --step verify
      bun --no-install packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER"
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: helm-push

  - label: ":terraform: tofu apply (infra stacks)"
    key: tofu-apply
    if: build.branch == pipeline.default_branch
    depends_on: [verify, helm-push]
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh tofu; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      for stack in seaweedfs tailscale buildkite arr pagerduty; do
        bun --no-install packages/homelab/scripts/tofu-stack.ts "$$stack" apply
      done
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: tofu-apply

  - label: ":terraform: tofu apply (github)"
    key: tofu-github
    if: build.branch == pipeline.default_branch
    depends_on: verify
    cancel_on_build_failing: true
    concurrency: 1
    concurrency_group: monorepo/tofu-github
    # No automatic retry: GitHub API mutations are not idempotent on partial
    # failure (same policy as the old pipeline).
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh tofu; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun --no-install packages/homelab/scripts/tofu-stack.ts github apply
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: tofu-github

  - label: ":argo: sync + wait"
    key: argocd-sync
    if: build.branch == pipeline.default_branch
    depends_on: [images, helm-push, tofu-apply]
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh argocd; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter '@homelab/cdk8s' --production
      # The CI secret uses the argocd CLI's canonical ARGOCD_AUTH_TOKEN name;
      # argocd.ts reads ARGOCD_TOKEN (build 5648).
      export ARGOCD_TOKEN="$$ARGOCD_AUTH_TOKEN"
      bun --no-install packages/homelab/scripts/argocd.ts sync apps
      bun --no-install packages/homelab/scripts/argocd.ts tree-health-wait apps --timeout 300
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: argocd-sync

  # Standing promotion PR: whenever beta has something prod doesn't (prod
  # never promoted, backend image line changed, or the scout package changed
  # since the promoted site version's commit), open/refresh the
  # scout-promote-pending PR moving BOTH prod pins in versions.ts to what beta
  # serves; close it when prod is caught up. Merging that PR IS the promotion —
  # ArgoCD (backend) and scout-prod-reconcile (site) act on the pin change.
  # Auto-merge is deliberately not enabled: that would make prod track beta
  # continuously instead of promotion being a review click.
  - label: ":package: scout promotion PR"
    key: scout-promotion
    if: build.branch == pipeline.default_branch
    depends_on: sites
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh scout-promotion; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter '@shepherdjerred/root-scripts' --production
      # SeaweedFS creds: reads archive manifests to gate on real scout changes.
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun --no-install scripts/promote-scout.ts --ci --site-version "2.0.0-$BUILDKITE_BUILD_NUMBER"
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: scout-promotion

  # Reconcile the prod scout site to its versions.ts pin. Usually a no-op
  # (bucket marker == pin); after a promotion merge it syncs the archived
  # artifact for the pinned version into the prod bucket. Ordered AFTER
  # argocd-sync on purpose: the promoted backend deploys first, so the
  # transient mid-promotion mix is old-frontend/new-backend — the safe
  # direction (the reverse skew is what crashed the prod SPA). Shares the
  # site-deploys concurrency group so it never races a beta sync.
  - label: ":rocket: scout prod reconcile"
    key: scout-prod-reconcile
    if: build.branch == pipeline.default_branch
    depends_on: [argocd-sync, sites]
    cancel_on_build_failing: true
    concurrency: 1
    concurrency_group: monorepo/site-deploys
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh scout-reconcile; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter '@shepherdjerred/root-scripts' --production
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun --no-install scripts/scout-site-release.ts reconcile-prod
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: scout-prod-reconcile

  - label: ":terraform: tofu apply (cloudflare, after tunnel gate)"
    key: tofu-cloudflare
    if: build.branch == pipeline.default_branch
    depends_on: argocd-sync
    cancel_on_build_failing: true
    concurrency: 1
    concurrency_group: monorepo/tofu-cloudflare
    # Fail-closed: the SeaweedFS TunnelBinding finalizer must complete before
    # the Cloudflare DNS tunnel route is removed (same gate as the old CI).
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh tofu; then
        if ! bash .buildkite/scripts/ci-changed.sh argocd; then exit 0; fi
      fi
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter '@homelab/cdk8s' --production
      # Same ARGOCD_AUTH_TOKEN → ARGOCD_TOKEN mapping as the sync step.
      export ARGOCD_TOKEN="$$ARGOCD_AUTH_TOKEN"
      bun --no-install packages/homelab/scripts/argocd.ts wait-deletion apps --group networking.cfargotunnel.com --version v1alpha1 --kind TunnelBinding --namespace seaweedfs --timeout 120
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun --no-install packages/homelab/scripts/tofu-stack.ts cloudflare apply
    # Safe to retry: tofu re-plans from state, and the scripts only exit 34
    # (the retryable code) on classified transient failures.
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: tofu-cloudflare

  # ── Main-only: release automation ─────────────────────────────────────────
  # Gates on verify only: release-please consumes no image or site artifact
  # (build 5644: gating on [images, sites] parked it behind the 52-min images
  # step for no data reason). The version commit-back — which DOES consume the
  # pushed image digests — is its own step below, gated on images.
  - label: ":package: release-please"
    key: release-please
    if: build.branch == pipeline.default_branch
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun --no-install scripts/release.ts
    # Safe to retry: release-please upserts its PR and skips already-cut
    # releases; a GitHub GraphQL 500 (build 5809) exits 34 via transient.ts.
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: release-please

  # Version commit-back: rewrites versions.ts tag@digest pins from the digests
  # the images step recorded in build meta-data, and opens the auto-merge bump
  # PR. (The replatform's bare `bun scripts/update-versions.ts` invocation was
  # a stub — no digest plumbing existed, and the step exited 1 on every build
  # that reached it.) Digest-unchanged entries are skipped, so a no-change
  # merge redeploys nothing.
  - label: ":package: version commit-back"
    key: version-commit-back
    if: build.branch == pipeline.default_branch
    depends_on: images
    cancel_on_build_failing: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun --no-install scripts/update-versions.ts --commit-back "2.0.0-$BUILDKITE_BUILD_NUMBER" --digests "$$(buildkite-agent meta-data get image-digests)"
    # Safe to retry: the bump branch is force-updated and the PR lookup is
    # find-or-create; transient gh/git failures exit 34 via transient.ts.
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: version-commit-back

  # ── Main-only: cooklang Obsidian plugin release ───────────────────────────
  # Publishes to the plugin repo + commits the version back (idempotent: the
  # script skips the release cut when the version tag already exists).
  - label: ":knife_fork_plate: cooklang plugin publish"
    key: cooklang-publish
    if: build.branch == pipeline.default_branch
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh cooklang; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile --filter cooklang-for-obsidian
      bun --no-install run --cwd packages/cooklang-for-obsidian publish:plugin
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: cooklang-publish

  # ── Toolchain image refresh ───────────────────────────────────────────────
  - label: ":docker: ci-image refresh"
    key: ci-image-refresh
    if: build.branch == pipeline.default_branch
    depends_on: verify
    cancel_on_build_failing: true
    command: |
      if ! bash .buildkite/scripts/ci-changed.sh ci-image; then exit 0; fi
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bash .buildkite/scripts/build-ci-image.sh
    retry: *retry
    plugins:
      - kubernetes:
          <<: *pod_privileged_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: ci-image-refresh

  # ── Main-only: build summary annotation (runs even when deploys fail) ─────
  - label: ":memo: build summary"
    key: build-summary
    if: build.branch == pipeline.default_branch
    depends_on:
      - verify
      - playwright-e2e-main
      - resume-build-main
      - docker-e2e-main
      - images
      - sites
      - helm-push
      - tofu-apply
      - argocd-sync
    allow_dependency_failure: true
    command: bash .buildkite/scripts/annotate-build-summary.sh
    plugins:
      - kubernetes:
          <<: *pod_light_kubernetes
          metadata:
            labels:
              ci.sjer.red/step-key: build-summary
