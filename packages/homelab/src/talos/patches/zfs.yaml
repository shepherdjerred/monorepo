# ZFS kernel module parameters
# ARC maximum set to 48 GB (aligned with sysfs override in image.yaml)
# Leaves ~77 GB for K8s pods + OS (69 Gi allocatable after kubelet reservations)
machine:
  kernel:
    modules:
      - name: zfs
        parameters:
          - zfs_arc_max=51539607552 # 48 GB (matches sysfs override in image.yaml)
          - zfs_arc_min=8589934592 # 8 GB minimum
