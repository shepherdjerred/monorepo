# Static Buildkite pipeline — no generator. `turbo --affected` + the remote
# cache replace the old dynamic pipeline's change detection: every build runs
# the same steps, and unchanged work replays from cache in milliseconds.
#
# Invariant (scope-creep guard): CI runs nothing besides `mise install`,
# `bun install`, `turbo run …` (via `bun run verify`), `docker buildx`, and
# the thin deploy scripts. If a step needs more, fix the task graph instead.

agents:
  queue: default

# Every step runs in the toolchain image baked from .mise.toml
# (.buildkite/ci-image) — same tool versions as every laptop.
# Steps that run repo tasks start with `. .buildkite/scripts/toolchain.sh`
# — a fast no-op on a current image, a runtime mise bootstrap on a stale one.
common:
  - pod: &pod
      kubernetes:
        checkout:
          # Full clone: turbo --affected needs the merge-base with main.
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              # :latest is mutable and the ci-image refresh step repushes it;
              # the k8s default IfNotPresent pinned pods to a stale node-cached
              # image (build 5648: release step lacked the claude CLI baked
              # into the current image).
              imagePullPolicy: Always
              env:
                # kubernetes-bootstrap runs step commands via /bin/sh by
                # default — dash on the debian ci-base, which rejects
                # toolchain.sh's `set -o pipefail` (build 5651).
                - name: BUILDKITE_SHELL
                  value: "/bin/bash -e -c"
              resources:
                requests: { cpu: "2", memory: "4Gi" }
                limits: { cpu: "7", memory: "12Gi" }
              volumeMounts:
                # Checkouts are mirror-backed (default-checkout-params.gitMirrors):
                # .git/objects/info/alternates points into this volume, so every
                # container that runs git (turbo hashing, go VCS stamping —
                # build 5694) needs the mirror mounted, not just the checkout
                # container. The agent stack adds the pod-level volume.
                - name: buildkite-git-mirrors
                  mountPath: /buildkite/git-mirrors
                  readOnly: true
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
  - pod_privileged: &pod_privileged
      kubernetes:
        checkout:
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              # Same stale-:latest guard as the base pod above.
              imagePullPolicy: Always
              env:
                - name: DOCKER_HOST
                  value: "tcp://127.0.0.1:2375"
                # Same dash-vs-bash guard as the base pod above (build 5651).
                - name: BUILDKITE_SHELL
                  value: "/bin/bash -e -c"
              resources:
                requests: { cpu: "2", memory: "6Gi" }
                limits: { cpu: "7", memory: "14Gi" }
              volumeMounts:
                # Checkouts are mirror-backed (default-checkout-params.gitMirrors):
                # .git/objects/info/alternates points into this volume, so every
                # container that runs git (turbo hashing, go VCS stamping —
                # build 5694) needs the mirror mounted, not just the checkout
                # container. The agent stack adds the pod-level volume.
                - name: buildkite-git-mirrors
                  mountPath: /buildkite/git-mirrors
                  readOnly: true
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
          # Docker daemon for image builds + compose e2e, as a NATIVE SIDECAR
          # (initContainer + restartPolicy Always): kubelet terminates it by
          # itself once the regular containers finish, so pod completion never
          # depends on the agent-stack controller's Job-reap update. As a
          # regular container it zombied: the reap raced a kyverno/kueue
          # webhook outage (failurePolicy=Fail rejected the update) and the
          # finished pod held ~4 CPU/10Gi of Kueue quota for 2.5h, starving
          # the whole queue (2026-07-18; same freeze signature as 07-05/08).
          # Steps source .buildkite/scripts/docker-env.sh (CLI bootstrap +
          # daemon wait).
          initContainers:
            - name: dind
              # renovate: datasource=docker depName=docker
              image: "docker:28-dind"
              restartPolicy: Always
              securityContext: { privileged: true }
              env:
                - name: DOCKER_TLS_CERTDIR
                  value: ""
              resources:
                requests: { cpu: "1", memory: "2Gi" }
                limits: { cpu: "4", memory: "8Gi" }
  # Light steps: thin deploy/publish/annotate scripts whose work is seconds
  # even on a cold cache. Small REQUESTS so Kueue admits them alongside the
  # long images job (7.5 CPU / 16Gi namespace quota — build 5644: light steps
  # sat runnable 3-66 min behind it); limits stay high so a cold-cache burst
  # still gets real CPU. Steps that do heavy work when cold (verify, e2e,
  # images, site builds' turbo graph) keep the full-size pod.
  - pod_light: &pod_light
      kubernetes:
        checkout:
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              imagePullPolicy: Always
              env:
                - name: BUILDKITE_SHELL
                  value: "/bin/bash -e -c"
              resources:
                requests: { cpu: "500m", memory: "1Gi" }
                limits: { cpu: "7", memory: "12Gi" }
              volumeMounts:
                # Checkouts are mirror-backed (default-checkout-params.gitMirrors):
                # .git/objects/info/alternates points into this volume, so every
                # container that runs git (turbo hashing, go VCS stamping —
                # build 5694) needs the mirror mounted, not just the checkout
                # container. The agent stack adds the pod-level volume.
                - name: buildkite-git-mirrors
                  mountPath: /buildkite/git-mirrors
                  readOnly: true
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
  - retry: &retry
      automatic:
        # Transient infra failures only; logical failures (1, 3) never retry.
        # 34 is the script-declared transient code: CI scripts that talk to
        # external services classify failures via scripts/lib/transient.ts and
        # exit 34 when the error matches a known transient signature
        # (5xx, network, GitHub GraphQL 500), so only retryable failures retry.
        - exit_status: 255
          limit: 2
        - exit_status: 34
          limit: 2
        - exit_status: -1
          limit: 2

env:
  TURBO_SCM_BASE: "origin/main"
  TURBO_TELEMETRY_DISABLED: "1"
  # Remote cache (ducktors/turborepo-remote-cache, R2-backed). CI pods run
  # in-cluster, so they hit the Service directly instead of the Tailscale
  # ingress developer machines use. TURBO_TOKEN comes from the
  # buildkite-ci-secrets envFrom; turbo leaves remote caching disabled until
  # all three of API/TEAM/TOKEN are present, so a missing token degrades to
  # local-cache-only rather than failing the build.
  TURBO_API: "http://turbo-cache-turbo-cache-service.turbo-cache.svc.cluster.local:3000"
  TURBO_TEAM: "monorepo"

steps:
  # ── Release-please PR auto-skip ──────────────────────────────────────────
  # Webhook builds of release-please's own PR (branch
  # release-please--branches--main) are no-op version bumps; every step
  # carries the guard below so the build uploads zero jobs instead of burning
  # the full pipeline (the old generator's shouldSkipReleasePleasePrBuild,
  # restored). Deliberately narrow: only build.source == "webhook" skips — a
  # manual New Build (ui/api/schedule/trigger_job) runs full CI, and
  # RUN_RELEASE_CI=true forces a run regardless. The empty build still passes
  # (the pipeline-upload step always runs), so the aggregate
  # buildkite/monorepo/pr required status goes green and the release PR stays
  # mergeable. The guard is AND-ed with each step's own condition:
  #   build.branch != "release-please--branches--main"
  #     || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"

  # ── Verify: the whole task graph + every repo check ──────────────────────
  # PRs run affected-scoped; main re-verifies EVERYTHING (cheap via cache).
  # The turbo run summary is annotated onto the build either way, without
  # masking verify's exit code.
  - label: ":turborepo: verify"
    key: verify
    if: build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      if [ "$BUILDKITE_BRANCH" = "main" ]; then SCOPE=""; else SCOPE="--affected"; fi
      set +e
      bun run verify -- $$SCOPE --filter='!sjer.red' --filter='!@shepherdjerred/resume' --concurrency=6 --output-logs=errors-only --summarize
      verify_status=$?
      set -e
      bun scripts/annotate-turbo-summary.ts
      exit "$$verify_status"
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Playwright e2e (PR + main) — browser-equipped container, bun installed
  # the same way the old CI's playwright step did. Browser-based test:e2e
  # members only; docker-compose e2e runs in the docker e2e step below.
  - label: ":performing_arts: playwright e2e"
    key: e2e
    if: build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"
    command: |
      apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip
      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
      export PATH="/root/.bun/bin:$$PATH"
      bun install --frozen-lockfile
      # PR gate: skip the browser install + full sjer.red build when the site
      # isn't affected. is-affected.ts fails loudly on tool error — only a
      # clean "unaffected" verdict skips. Main always runs (the sites deploy
      # consumes this step's dist artifact).
      if [ "$BUILDKITE_BRANCH" != "main" ]; then
        verdict=$(bun scripts/is-affected.ts sjer.red)
        if [ "$$verdict" = "unaffected" ]; then
          echo "sjer.red unaffected on this branch — skipping playwright e2e"
          exit 0
        fi
      fi
      # Install the browser builds for the REPO-resolved playwright (run from
      # the package so bunx uses its dependency, not a downloaded latest):
      # chromium + headless-shell + webkit (the suite runs Mobile Safari).
      cd packages/sjer.red && bunx playwright install && cd ../..
      bunx turbo run build typecheck lint test test:e2e --filter=sjer.red --concurrency=2
    # The deploy-sites step ships this dist: sjer.red's build needs playwright
    # browsers (rehype-mermaid renders diagrams at build time), which only
    # exist in this container — build 5636 failed rebuilding it in ci-base.
    # Both globs are required: Buildkite's `**/*` needs an intermediate dir, so
    # it silently skips root-level files (dist/index.html, dist/rss.xml) — the
    # missing `dist/*` glob let build 5648's --delete sync wipe every root
    # object from the sjer-red bucket.
    artifact_paths:
      - "packages/sjer.red/dist/**/*"
      - "packages/sjer.red/dist/*"
    retry: *retry
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=mcr.microsoft.com/playwright
                image: "mcr.microsoft.com/playwright:v1.61.1-noble"
                resources:
                  requests: { cpu: "2", memory: "4Gi" }
                  limits: { cpu: "4", memory: "8Gi" }
                volumeMounts:
                  # Mirror-backed checkouts: see the container-0 mounts in the
                  # shared pod anchors (turbo runs git in these containers).
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  # ── Resume build (PR + main) — xelatex needs a full TeX distribution; the
  # old CI used the texlive/texlive container for exactly this. Excluded from
  # the verify pod (--filter='!@shepherdjerred/resume').
  - label: ":scroll: resume build"
    key: resume-build
    if: build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"
    command: |
      apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip curl
      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
      # The agent constructs its own PATH; re-add the texlive bin dir.
      export PATH="/root/.bun/bin:$(dirname "$(find /usr/local/texlive -name xelatex | head -1)"):$$PATH"
      bun install --frozen-lockfile
      # PR gate: same affectedness skip as the e2e step (fail-loud helper).
      # Main always runs — the sites deploy consumes this step's PDF artifact.
      if [ "$BUILDKITE_BRANCH" != "main" ]; then
        verdict=$(bun scripts/is-affected.ts '@shepherdjerred/resume')
        if [ "$$verdict" = "unaffected" ]; then
          echo "@shepherdjerred/resume unaffected on this branch — skipping resume build"
          exit 0
        fi
      fi
      bunx turbo run build --filter='@shepherdjerred/resume'
    # The deploy-sites step ships this PDF: resume.pdf is a build artifact
    # (gitignored, not committed) and xelatex only exists in this container.
    # Glob (not a literal path) so the unaffected-PR skip doesn't log a
    # nothing-matched upload warning. A missing artifact can't slip through:
    # deploy-sites' explicit `artifact download` fails hard, and this step
    # never skips on main.
    artifact_paths: "packages/resume/*.pdf"
    retry: *retry
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=texlive/texlive
                image: "texlive/texlive:TL2024-historic"
                resources:
                  requests: { cpu: "1", memory: "2Gi" }
                  limits: { cpu: "2", memory: "4Gi" }
                volumeMounts:
                  # Mirror-backed checkouts: see the container-0 mounts in the
                  # shared pod anchors (turbo runs git in these containers).
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  # ── Helm value types drift gate (PR-only). The committed
  # packages/homelab/src/cdk8s/generated/helm types must be regenerated in the
  # same PR that changes a generator input. Replaces the deleted freshness
  # mechanisms (helm-types-weekly-refresh Temporal schedule → #1168 Dagger
  # gate → lost in the Buildkite replatform #1516). Accepted trade-off:
  # Renovate chart bumps touching versions.ts fail here until someone pushes
  # the regen commit (--check prints the command; hosted Renovate cannot run
  # it). Main is skipped: inputs are fully version-pinned, so a green PR gate
  # implies a green main tree. helm comes from the ci-image's mise toolchain.
  - label: ":helm: helm types drift check"
    key: helm-types-drift-check
    if: build.branch != pipeline.default_branch && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    command: |
      . .buildkite/scripts/toolchain.sh
      # Self-scope: regenerating pulls ~26 charts over the network — run only
      # when a generator input (or the committed output) changed vs the merge
      # base. Paths span two turbo packages, so a git diff beats turbo
      # affectedness here (any cdk8s change would otherwise trigger it).
      base=$(git merge-base origin/main HEAD)
      if git diff --quiet "$$base" HEAD -- \
          packages/homelab/src/cdk8s/src/versions.ts \
          packages/homelab/src/cdk8s/scripts/generate-helm-types.ts \
          packages/homelab/src/cdk8s/scripts/parse-helm-charts.ts \
          packages/homelab/src/helm-types \
          packages/homelab/src/cdk8s/generated/helm; then
        echo "helm-types generator inputs unchanged vs main — skipping drift check"
        exit 0
      fi
      bun install --frozen-lockfile
      cd packages/homelab/src/cdk8s
      bun run generate-helm-types --check
    retry: *retry
    plugins:
      - *pod_light

  # ── Docker-compose e2e (PR + main) — llm-observability spins up a compose
  # stack; needs the privileged pod's docker, not a browser container.
  - label: ":docker: docker e2e"
    key: docker-e2e
    if: build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      bunx turbo run test:e2e --filter='@shepherdjerred/llm-observability'
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Scanners (soft-fail) + review gate (blocking), parallel with everything
  - label: ":shield: trivy"
    soft_fail: true
    if: build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"
    command: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 .
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=1"
          podSpecPatch:
            containers:
              - name: container-0
                # renovate: datasource=docker depName=aquasec/trivy
                image: "aquasec/trivy:0.72.0"
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }
                  limits: { cpu: "2", memory: "4Gi" }

  - label: ":mag: semgrep"
    soft_fail: true
    if: build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true"
    # Excludes mirror the .gitleaks.toml allowlist: these paths hold values
    # already triaged as non-sensitive (legacy/undeployed sandbox archive,
    # a disabled Minecraft management-server secret, a public Firebase web
    # apiKey). semgrep's generic-secret rule would otherwise re-print those
    # values into the log on every build. Real code stays fully scanned.
    command: |
      semgrep scan --config auto --error \
        --exclude sandbox \
        --exclude server.properties \
        --exclude fetcher.ts \
        .
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=1"
          podSpecPatch:
            containers:
              - name: container-0
                # renovate: datasource=docker depName=semgrep/semgrep
                image: "semgrep/semgrep:1.170.0"
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }
                  limits: { cpu: "2", memory: "4Gi" }

  # Blocking, like the old pipeline (greptileReviewStep sat in blockingGates
  # and fed the required check): every non-outdated Greptile review thread on
  # the PR must be resolved before the aggregate buildkite/monorepo/pr
  # required status can go green. wait-for-greptile.ts polls only while
  # Greptile is still reviewing the head commit, then fails fast with the
  # unresolved-thread list.
  - label: ":robot_face: greptile review gate"
    if: build.branch != pipeline.default_branch && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun scripts/wait-for-greptile.ts
    retry: *retry
    plugins:
      - *pod_light

  # ── PR-only dry-run lane: validate every deploy path, no side effects ─────
  # (the old pipeline's --dryrun plumbing, restored)
  - label: ":terraform: tofu plan"
    if: build.branch != pipeline.default_branch && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      for stack in seaweedfs tailscale buildkite arr pagerduty github cloudflare; do
        bun packages/homelab/scripts/tofu-stack.ts "$$stack" plan
      done
    retry: *retry
    plugins:
      - *pod

  - label: ":docker: images — build + smoke (PR dry-run)"
    if: build.branch != pipeline.default_branch && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      # Affected-scoped parallel bake + smoke, no push, cache read-only
      # (PUSH_CACHE stays false — only main writes the buildcache refs).
      # Rehearses exactly the path main runs, including the --load transfer.
      bash .buildkite/scripts/bake-images.sh --affected
    retry: *retry
    plugins:
      - *pod_privileged

  - label: ":rocket: sites + helm + release (PR dry-run)"
    if: build.branch != pipeline.default_branch && (build.branch != "release-please--branches--main" || build.source != "webhook" || build.env("RUN_RELEASE_CI") == "true")
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      for site in sjer.red resume webring cooklang-rich-preview stocks-sjer-red better-skill-capped glitter; do
        bun scripts/deploy-site.ts "$$site" --dry-run
      done
      # Scout sites deploy versioned + stage-pinned (not via the catalog);
      # rehearse all three subcommands so PRs exercise the real main path.
      bun scripts/scout-site-release.ts archive --version "2.0.0-$BUILDKITE_BUILD_NUMBER" --dry-run
      bun scripts/scout-site-release.ts deploy-beta --version "2.0.0-$BUILDKITE_BUILD_NUMBER" --dry-run
      bun scripts/scout-site-release.ts reconcile-prod --dry-run
      bun scripts/promote-scout.ts --ci --site-version "2.0.0-$BUILDKITE_BUILD_NUMBER" --dry-run
      bun packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER" --dry-run
      bun scripts/release.ts --dry-run
    retry: *retry
    plugins:
      - *pod

  # ── Main-only: images (parallel bake + smoke + push) ─────────────────────
  - label: ":docker: images — build, smoke, push"
    key: images
    if: build.branch == pipeline.default_branch
    depends_on: verify
    concurrency: 1
    concurrency_group: monorepo/image-push
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      bash .buildkite/scripts/bake-images.sh --push
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Main-only: static sites ───────────────────────────────────────────────
  - label: ":rocket: deploy sites"
    key: sites
    if: build.branch == pipeline.default_branch
    depends_on: [verify, e2e, resume-build]
    concurrency: 1
    concurrency_group: monorepo/site-deploys
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      # Site syncs push to SeaweedFS S3 — same credential mapping as the
      # tofu steps (the secret exposes SEAWEEDFS_*, the AWS CLI wants AWS_*).
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      # Pods are ephemeral: site buildCmds import workspace library dists
      # (sjer.red → astro-opengraph-images/webring, scout → data/ui) that
      # only existed in the verify pod. Build the graph here first — same
      # exclusions as verify; the sites' own builds run via deploy-site.ts
      # with their deploy env (build 5633: sjer.red failed to resolve the
      # unbuilt astro-opengraph-images entry).
      bunx turbo run build --filter='!sjer.red' --filter='!@shepherdjerred/resume' --concurrency=6 --output-logs=errors-only
      # sjer.red can't build here (rehype-mermaid needs playwright browsers,
      # build 5636) — the e2e step builds it in the playwright container and
      # ships the dist as a build artifact; deploy it prebuilt. Two downloads:
      # `**/*` misses root-level files (see the e2e artifact_paths comment).
      buildkite-agent artifact download "packages/sjer.red/dist/**/*" . --step e2e
      buildkite-agent artifact download "packages/sjer.red/dist/*" . --step e2e
      bun scripts/deploy-site.ts sjer.red --prebuilt
      # resume can't build here either (xelatex only exists in the texlive
      # container) — the resume-build step ships resume.pdf as a build
      # artifact; deploy it prebuilt. The PDF is gitignored, not committed.
      buildkite-agent artifact download "packages/resume/resume.pdf" . --step resume-build
      bun scripts/deploy-site.ts resume --prebuilt
      for site in webring cooklang-rich-preview stocks-sjer-red better-skill-capped glitter; do
        bun scripts/deploy-site.ts "$$site"
      done
      # Scout sites are versioned + stage-pinned (lockstep with the backend
      # image pins): archive the prod-flavored artifact for promotion, then
      # deploy the beta flavor live (beta stays continuous — it's the canary).
      # Prod is synced separately by scout-prod-reconcile from the pinned
      # archive, never from this build's dist.
      bun scripts/scout-site-release.ts archive --version "2.0.0-$BUILDKITE_BUILD_NUMBER"
      bun scripts/scout-site-release.ts deploy-beta --version "2.0.0-$BUILDKITE_BUILD_NUMBER"
    retry: *retry
    plugins:
      - *pod_light

  # ── Main-only: npm publishes ──────────────────────────────────────────────
  # Two lanes, matching the old pipeline's npm-publish-all-prod/-dev pair:
  # the prod lane publishes package.json versions to --tag latest (idempotent
  # via --tolerate-republish, so it's a no-op except on the build after a
  # release-please merge bumps versions); the dev lane then publishes
  # <version>-dev.<build#> to --tag dev on every main build. Prod runs FIRST;
  # dev mode rewrites package.json versions mid-publish (and restores them in
  # a finally, so a failed dev publish can't leak -dev.N into a later prod run).
  - label: ":npm: publish packages"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun run --cwd packages/astro-opengraph-images publish:npm
      bun run --cwd packages/webring publish:npm
      bun run --cwd packages/homelab/src/helm-types publish:npm
      bun scripts/publish-npm.ts packages/astro-opengraph-images --dev-suffix "$BUILDKITE_BUILD_NUMBER"
      bun scripts/publish-npm.ts packages/webring --dev-suffix "$BUILDKITE_BUILD_NUMBER"
      bun scripts/publish-npm.ts packages/homelab/src/helm-types --dev-suffix "$BUILDKITE_BUILD_NUMBER"
    retry: *retry
    plugins:
      - *pod_light

  # ── Main-only: homelab release track ─────────────────────────────────────
  - label: ":helm: helm push"
    key: helm-push
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER"
    retry: *retry
    plugins:
      - *pod_light

  - label: ":terraform: tofu apply (infra stacks)"
    key: tofu-apply
    if: build.branch == pipeline.default_branch
    depends_on: [verify, helm-push]
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      for stack in seaweedfs tailscale buildkite arr pagerduty; do
        bun packages/homelab/scripts/tofu-stack.ts "$$stack" apply
      done
    retry: *retry
    plugins:
      - *pod_light

  - label: ":terraform: tofu apply (github)"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    concurrency: 1
    concurrency_group: monorepo/tofu-github
    # No automatic retry: GitHub API mutations are not idempotent on partial
    # failure (same policy as the old pipeline).
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun packages/homelab/scripts/tofu-stack.ts github apply
    plugins:
      - *pod_light

  - label: ":argo: sync + wait"
    key: argocd-sync
    if: build.branch == pipeline.default_branch
    depends_on: [images, helm-push, tofu-apply]
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      # The CI secret uses the argocd CLI's canonical ARGOCD_AUTH_TOKEN name;
      # argocd.ts reads ARGOCD_TOKEN (build 5648).
      export ARGOCD_TOKEN="$$ARGOCD_AUTH_TOKEN"
      bun packages/homelab/scripts/argocd.ts sync apps
      bun packages/homelab/scripts/argocd.ts health-wait apps --timeout 300
    retry: *retry
    plugins:
      - *pod

  # Standing promotion PR: whenever beta has something prod doesn't (prod
  # never promoted, backend image line changed, or the scout package changed
  # since the promoted site version's commit), open/refresh the
  # scout-promote-pending PR moving BOTH prod pins in versions.ts to what beta
  # serves; close it when prod is caught up. Merging that PR IS the promotion —
  # ArgoCD (backend) and scout-prod-reconcile (site) act on the pin change.
  # Auto-merge is deliberately not enabled: that would make prod track beta
  # continuously instead of promotion being a review click.
  - label: ":package: scout promotion PR"
    if: build.branch == pipeline.default_branch
    depends_on: sites
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      # SeaweedFS creds: reads archive manifests to gate on real scout changes.
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun scripts/promote-scout.ts --ci --site-version "2.0.0-$BUILDKITE_BUILD_NUMBER"
    plugins:
      - *pod_light

  # Reconcile the prod scout site to its versions.ts pin. Usually a no-op
  # (bucket marker == pin); after a promotion merge it syncs the archived
  # artifact for the pinned version into the prod bucket. Ordered AFTER
  # argocd-sync on purpose: the promoted backend deploys first, so the
  # transient mid-promotion mix is old-frontend/new-backend — the safe
  # direction (the reverse skew is what crashed the prod SPA). Shares the
  # site-deploys concurrency group so it never races a beta sync.
  - label: ":rocket: scout prod reconcile"
    key: scout-prod-reconcile
    if: build.branch == pipeline.default_branch
    depends_on: [argocd-sync, sites]
    concurrency: 1
    concurrency_group: monorepo/site-deploys
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun scripts/scout-site-release.ts reconcile-prod
    retry: *retry
    plugins:
      - *pod_light

  - label: ":terraform: tofu apply (cloudflare, after tunnel gate)"
    if: build.branch == pipeline.default_branch
    depends_on: argocd-sync
    concurrency: 1
    concurrency_group: monorepo/tofu-cloudflare
    # Fail-closed: the SeaweedFS TunnelBinding finalizer must complete before
    # the Cloudflare DNS tunnel route is removed (same gate as the old CI).
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      # Same ARGOCD_AUTH_TOKEN → ARGOCD_TOKEN mapping as the sync step.
      export ARGOCD_TOKEN="$$ARGOCD_AUTH_TOKEN"
      bun packages/homelab/scripts/argocd.ts wait-deletion apps --group networking.cfargotunnel.com --version v1alpha1 --kind TunnelBinding --namespace seaweedfs --timeout 120
      export AWS_ACCESS_KEY_ID="$$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun packages/homelab/scripts/tofu-stack.ts cloudflare apply
    # Safe to retry: tofu re-plans from state, and the scripts only exit 34
    # (the retryable code) on classified transient failures.
    retry: *retry
    plugins:
      - *pod_light

  # ── Main-only: release automation ─────────────────────────────────────────
  # Gates on verify only: release-please consumes no image or site artifact
  # (build 5644: gating on [images, sites] parked it behind the 52-min images
  # step for no data reason). The version commit-back — which DOES consume the
  # pushed image digests — is its own step below, gated on images.
  - label: ":package: release-please"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun scripts/release.ts
    # Safe to retry: release-please upserts its PR and skips already-cut
    # releases; a GitHub GraphQL 500 (build 5809) exits 34 via transient.ts.
    retry: *retry
    plugins:
      - *pod_light

  # Version commit-back: rewrites versions.ts tag@digest pins from the digests
  # the images step recorded in build meta-data, and opens the auto-merge bump
  # PR. (The replatform's bare `bun scripts/update-versions.ts` invocation was
  # a stub — no digest plumbing existed, and the step exited 1 on every build
  # that reached it.) Digest-unchanged entries are skipped, so a no-change
  # merge redeploys nothing.
  - label: ":package: version commit-back"
    if: build.branch == pipeline.default_branch
    depends_on: images
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun scripts/update-versions.ts --commit-back "2.0.0-$BUILDKITE_BUILD_NUMBER" --digests "$$(buildkite-agent meta-data get image-digests)"
    # Safe to retry: the bump branch is force-updated and the PR lookup is
    # find-or-create; transient gh/git failures exit 34 via transient.ts.
    retry: *retry
    plugins:
      - *pod_light

  # ── Main-only: cooklang Obsidian plugin release ───────────────────────────
  # Publishes to the plugin repo + commits the version back (idempotent: the
  # script skips the release cut when the version tag already exists).
  - label: ":knife_fork_plate: cooklang plugin publish"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun run --cwd packages/cooklang-for-obsidian publish:plugin
    plugins:
      - *pod_light

  # ── Toolchain image refresh ───────────────────────────────────────────────
  - label: ":docker: ci-image refresh"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bash .buildkite/scripts/build-ci-image.sh
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Main-only: build summary annotation (runs even when deploys fail) ─────
  - label: ":memo: build summary"
    if: build.branch == pipeline.default_branch
    depends_on:
      - verify
      - e2e
      - docker-e2e
      - images
      - sites
      - helm-push
      - tofu-apply
      - argocd-sync
    allow_dependency_failure: true
    command: bash .buildkite/scripts/annotate-build-summary.sh
    plugins:
      - *pod_light
