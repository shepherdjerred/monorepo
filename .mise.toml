# Mise configuration for monorepo development
# `mise install` provides the toolchains. Dependency install/build steps are
# manual and scoped to the packages you touch — see AGENTS.md "Development
# Setup" (the setup.ts orchestrator was removed 2026-07; a workspace-based
# replacement is planned).

[tools]
# renovate: datasource=github-releases depName=oven-sh/bun
bun = "1.3.14"
rust = "1.95.0"
java = "corretto-25.0.3.9.1"
