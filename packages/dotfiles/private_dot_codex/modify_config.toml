{{- /* chezmoi:modify-template */ -}}
{{- $data := dict -}}
{{- if ne .chezmoi.stdin "" -}}
{{-   $data = fromToml .chezmoi.stdin -}}
{{- end -}}
{{- $bunxCmd := "bunx" -}}
{{- if eq .chezmoi.os "darwin" -}}
{{-   $bunxCmd = printf "%s/.local/share/mise/shims/bunx" .chezmoi.homeDir -}}
{{- end -}}
{{ $data |
  setValueAtPath "model" "gpt-5.1-codex-max" |
  setValueAtPath "model_reasoning_effort" "high" |
  setValueAtPath (list "projects" "/Users/jerred/git/monorepo" "trust_level") "trusted" |
  setValueAtPath (list "projects" "/Users/jerred/git" "trust_level") "trusted" |
  setValueAtPath (list "projects" "/Users/jerred/git/scout-for-lol" "trust_level") "trusted" |
  setValueAtPath (list "mcp_servers" "playwright" "command") $bunxCmd |
  setValueAtPath (list "mcp_servers" "playwright" "args") (list "-y" "@playwright/mcp") |
  toToml -}}
