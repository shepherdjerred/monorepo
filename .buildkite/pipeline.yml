# Static Buildkite pipeline — no generator. `turbo --affected` + the remote
# cache replace the old dynamic pipeline's change detection: every build runs
# the same steps, and unchanged work replays from cache in milliseconds.
#
# Invariant (scope-creep guard): CI runs nothing besides `mise install`,
# `bun install`, `turbo run …` (via `bun run verify`), `docker buildx`, and
# the thin deploy scripts. If a step needs more, fix the task graph instead.

agents:
  queue: default

# Every step runs in the toolchain image baked from .mise.toml
# (.buildkite/ci-image) — same tool versions as every laptop.
# Steps that run repo tasks start with `source .buildkite/scripts/toolchain.sh`
# — a fast no-op on a current image, a runtime mise bootstrap on a stale one.
common:
  - pod: &pod
      kubernetes:
        checkout:
          # Full clone: turbo --affected needs the merge-base with main.
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              resources:
                requests: { cpu: "2", memory: "4Gi" }
                limits: { cpu: "7", memory: "12Gi" }
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
  - pod_privileged: &pod_privileged
      kubernetes:
        checkout:
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              securityContext: { privileged: true }
              resources:
                requests: { cpu: "2", memory: "6Gi" }
                limits: { cpu: "7", memory: "14Gi" }
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
  - retry: &retry
      automatic:
        # Transient infra failures only; logical failures (1, 3) never retry.
        - exit_status: 255
          limit: 2
        - exit_status: 34
          limit: 2
        - exit_status: -1
          limit: 2

env:
  TURBO_SCM_BASE: "origin/main"
  TURBO_TELEMETRY_DISABLED: "1"
  # The de-mirrored agent config (cdk8s buildkite.ts on this branch) only
  # deploys after merge; until then the live agent-stack injects git-mirror
  # alternates whose volume these pods don't mount, breaking any git command
  # that reads objects. An empty mirrors path disables the mirror entirely.
  BUILDKITE_GIT_MIRRORS_PATH: ""

steps:
  # ── Verify: the whole task graph + every repo check ──────────────────────
  # PRs run affected-scoped; main re-verifies EVERYTHING (cheap via cache).
  # The turbo run summary is annotated onto the build either way, without
  # masking verify's exit code.
  - label: ":turborepo: verify"
    key: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      if [ "$BUILDKITE_BRANCH" = "main" ]; then SCOPE=""; else SCOPE="--affected"; fi
      set +e
      bun run verify -- $SCOPE --concurrency=6 --output-logs=errors-only --summarize
      verify_status=$?
      set -e
      bun scripts/annotate-turbo-summary.ts
      exit "$verify_status"
    retry: *retry
    plugins:
      - *pod

  # ── Playwright e2e (PR + main) — browser-equipped container, bun installed
  # the same way the old CI's playwright step did.
  - label: ":performing_arts: playwright e2e"
    key: e2e
    command: |
      apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip
      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
      export PATH="/root/.bun/bin:$PATH"
      bun install --frozen-lockfile
      bunx turbo run test:e2e --concurrency=2
    retry: *retry
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=mcr.microsoft.com/playwright
                image: "mcr.microsoft.com/playwright:v1.61.1-noble"
                resources:
                  requests: { cpu: "2", memory: "4Gi" }
                  limits: { cpu: "4", memory: "8Gi" }
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  # ── Soft-fail lane (parallel with everything) ─────────────────────────────
  - label: ":shield: trivy"
    soft_fail: true
    command: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 .
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=1"
          podSpecPatch:
            containers:
              - name: container-0
                image: "aquasec/trivy:latest"
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }

  - label: ":mag: semgrep"
    soft_fail: true
    command: semgrep scan --config auto --error .
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=1"
          podSpecPatch:
            containers:
              - name: container-0
                image: "semgrep/semgrep:latest"
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }

  - label: ":robot_face: greptile review gate"
    if: build.branch != pipeline.default_branch
    soft_fail: true
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun scripts/wait-for-greptile.ts
    plugins:
      - *pod

  # ── PR-only dry-run lane: validate every deploy path, no side effects ─────
  # (the old pipeline's --dryrun plumbing, restored)
  - label: ":terraform: tofu plan"
    if: build.branch != pipeline.default_branch
    depends_on: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      for stack in seaweedfs tailscale buildkite arr pagerduty github cloudflare; do
        bun packages/homelab/scripts/tofu-stack.ts "$stack" plan
      done
    retry: *retry
    plugins:
      - *pod

  - label: ":docker: images — build + smoke (PR dry-run)"
    if: build.branch != pipeline.default_branch
    depends_on: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      # Affected images build + smoke with registry layer cache; the three
      # nested-package families run unconditionally (turbo's nested --affected
      # under-selection bug — same workaround as the native shims). No push.
      bunx turbo run smoke --affected
      bunx turbo run smoke --filter='@discord-plays-pokemon/backend' --filter='@discord-plays-mario-kart/backend' --filter='@scout-for-lol/backend'
    retry: *retry
    plugins:
      - *pod_privileged

  - label: ":rocket: sites + helm + release (PR dry-run)"
    if: build.branch != pipeline.default_branch
    depends_on: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      for site in sjer.red resume webring cooklang-rich-preview stocks-sjer-red scout-frontend scout-frontend-beta better-skill-capped glitter; do
        bun scripts/deploy-site.ts "$site" --dry-run
      done
      bun packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER" --dry-run
      bun scripts/release.ts --dry-run
    retry: *retry
    plugins:
      - *pod

  # ── Main-only: images (build + smoke + push, serial per image) ───────────
  - label: ":docker: images — build, smoke, push"
    key: images
    if: build.branch == pipeline.default_branch
    depends_on: verify
    concurrency: 1
    concurrency_group: monorepo/image-push
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bash .buildkite/scripts/build-smoke-push-all.sh
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Main-only: static sites ───────────────────────────────────────────────
  - label: ":rocket: deploy sites"
    key: sites
    if: build.branch == pipeline.default_branch
    depends_on: verify
    concurrency: 1
    concurrency_group: monorepo/site-deploys
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      for site in sjer.red resume webring cooklang-rich-preview stocks-sjer-red scout-frontend scout-frontend-beta better-skill-capped glitter; do
        bun scripts/deploy-site.ts "$site"
      done
    retry: *retry
    plugins:
      - *pod

  # ── Main-only: npm publishes ──────────────────────────────────────────────
  - label: ":npm: publish packages"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun run --cwd packages/astro-opengraph-images publish:npm
      bun run --cwd packages/webring publish:npm
      bun run --cwd packages/homelab/src/helm-types publish:npm
    retry: *retry
    plugins:
      - *pod

  # ── Main-only: homelab release track ─────────────────────────────────────
  - label: ":helm: helm push"
    key: helm-push
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER"
    retry: *retry
    plugins:
      - *pod

  - label: ":terraform: tofu apply (infra stacks)"
    key: tofu-apply
    if: build.branch == pipeline.default_branch
    depends_on: [verify, helm-push]
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      for stack in seaweedfs tailscale buildkite arr pagerduty; do
        bun packages/homelab/scripts/tofu-stack.ts "$stack" apply
      done
    retry: *retry
    plugins:
      - *pod

  - label: ":terraform: tofu apply (github)"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    concurrency: 1
    concurrency_group: monorepo/tofu-github
    # No automatic retry: GitHub API mutations are not idempotent on partial
    # failure (same policy as the old pipeline).
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/tofu-stack.ts github apply
    plugins:
      - *pod

  - label: ":argo: sync + wait"
    key: argocd-sync
    if: build.branch == pipeline.default_branch
    depends_on: [images, helm-push, tofu-apply]
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/argocd.ts sync apps
      bun packages/homelab/scripts/argocd.ts health-wait apps --timeout 300
    retry: *retry
    plugins:
      - *pod

  - label: ":terraform: tofu apply (cloudflare, after tunnel gate)"
    if: build.branch == pipeline.default_branch
    depends_on: argocd-sync
    concurrency: 1
    concurrency_group: monorepo/tofu-cloudflare
    # Fail-closed: the SeaweedFS TunnelBinding finalizer must complete before
    # the Cloudflare DNS tunnel route is removed (same gate as the old CI).
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/argocd.ts wait-deletion apps --group networking.cfargotunnel.com --version v1alpha1 --kind TunnelBinding --namespace seaweedfs --timeout 120
      bun packages/homelab/scripts/tofu-stack.ts cloudflare apply
    plugins:
      - *pod

  # ── Main-only: release automation ─────────────────────────────────────────
  - label: ":package: release-please + version commit-back"
    if: build.branch == pipeline.default_branch
    depends_on: [images, sites]
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun scripts/release.ts
      bun scripts/update-versions.ts
    plugins:
      - *pod

  # ── Main-only: cooklang Obsidian plugin release ───────────────────────────
  # Publishes to the plugin repo + commits the version back (idempotent: the
  # script skips the release cut when the version tag already exists).
  - label: ":knife_fork_plate: cooklang plugin publish"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun run --cwd packages/cooklang-for-obsidian publish:plugin
    plugins:
      - *pod

  # ── Toolchain image refresh (only when .mise.toml or the Dockerfile moved) ─
  - label: ":docker: ci-image refresh"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      source .buildkite/scripts/toolchain.sh
      bash .buildkite/scripts/build-ci-image.sh
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Main-only: build summary annotation (runs even when deploys fail) ─────
  - label: ":memo: build summary"
    if: build.branch == pipeline.default_branch
    depends_on:
      - verify
      - e2e
      - images
      - sites
      - helm-push
      - tofu-apply
      - argocd-sync
    allow_dependency_failure: true
    command: bash .buildkite/scripts/annotate-build-summary.sh
    plugins:
      - *pod
