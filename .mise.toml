# Mise configuration for monorepo development AND CI.
# `mise install` provides every toolchain: dev machines, git hooks, and the
# CI toolchain image (.buildkite/ci-image) are all baked from this one file,
# so laptop and CI can never disagree about tool versions.

[tools]
# renovate: datasource=github-releases depName=oven-sh/bun
bun = "1.3.14"
rust = "1.95.0"
java = "corretto-25.0.3.9.1"
# Repo-wide checks + git hooks (verify/pre-commit call these directly)
gitleaks = "8"
shellcheck = "0.11"
# Native-family shims
go = "1.25"
golangci-lint = "2"
# Release automation (cooklang publish, release commit-backs) shells out to gh
gh = "2"
# CI scripts (bake-images.sh affected-scoping + digest collection) use jq
jq = "1"
# Homelab automation (helm push, tofu wrappers, ArgoCD sync, site deploys)
helm = "3"
opentofu = "1.10"
argocd = "3"
awscli = "2"
