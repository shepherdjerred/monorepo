[advisories]
yanked = "warn"
unmaintained = "workspace"
ignore = [
    # rustls-pemfile is unmaintained; replacement (rustls-pem) not yet adopted
    # by the dependency tree. Tracked upstream.
    "RUSTSEC-2025-0134",
    # rustls-webpki CRL validation vulnerability; waiting for upstream dep updates
    "RUSTSEC-2026-0049",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
