# Static Buildkite pipeline — no generator. `turbo --affected` + the remote
# cache replace the old dynamic pipeline's change detection: every build runs
# the same steps, and unchanged work replays from cache in milliseconds.
#
# Invariant (scope-creep guard): CI runs nothing besides `mise install`,
# `bun install`, `turbo run …` (via `bun run verify`), `docker buildx`, and
# the thin deploy scripts. If a step needs more, fix the task graph instead.

agents:
  queue: default

# Every step runs in the toolchain image baked from .mise.toml
# (.buildkite/ci-image) — same tool versions as every laptop.
# Steps that run repo tasks start with `. .buildkite/scripts/toolchain.sh`
# — a fast no-op on a current image, a runtime mise bootstrap on a stale one.
common:
  - pod: &pod
      kubernetes:
        checkout:
          # Full clone: turbo --affected needs the merge-base with main.
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              resources:
                requests: { cpu: "2", memory: "4Gi" }
                limits: { cpu: "7", memory: "12Gi" }
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
  - pod_privileged: &pod_privileged
      kubernetes:
        checkout:
          cloneFlags: "--no-tags"
        podSpecPatch:
          serviceAccountName: buildkite-agent-stack-k8s-controller
          containers:
            - name: container-0
              image: "ghcr.io/shepherdjerred/ci-base:latest"
              env:
                - name: DOCKER_HOST
                  value: "tcp://127.0.0.1:2375"
              resources:
                requests: { cpu: "2", memory: "6Gi" }
                limits: { cpu: "7", memory: "14Gi" }
              envFrom:
                - secretRef: { name: buildkite-ci-secrets }
            # Docker daemon sidecar for image builds + compose e2e. Steps source
            # .buildkite/scripts/docker-env.sh (CLI bootstrap + daemon wait).
            - name: dind
              # renovate: datasource=docker depName=docker
              image: "docker:28-dind"
              securityContext: { privileged: true }
              env:
                - name: DOCKER_TLS_CERTDIR
                  value: ""
              resources:
                requests: { cpu: "1", memory: "2Gi" }
                limits: { cpu: "4", memory: "8Gi" }
  - retry: &retry
      automatic:
        # Transient infra failures only; logical failures (1, 3) never retry.
        - exit_status: 255
          limit: 2
        - exit_status: 34
          limit: 2
        - exit_status: -1
          limit: 2

env:
  TURBO_SCM_BASE: "origin/main"
  TURBO_TELEMETRY_DISABLED: "1"
  # Remote cache (ducktors/turborepo-remote-cache, R2-backed). CI pods run
  # in-cluster, so they hit the Service directly instead of the Tailscale
  # ingress developer machines use. TURBO_TOKEN comes from the
  # buildkite-ci-secrets envFrom; turbo leaves remote caching disabled until
  # all three of API/TEAM/TOKEN are present, so a missing token degrades to
  # local-cache-only rather than failing the build.
  TURBO_API: "http://turbo-cache-turbo-cache-service.turbo-cache.svc.cluster.local:3000"
  TURBO_TEAM: "monorepo"

steps:
  # ── Verify: the whole task graph + every repo check ──────────────────────
  # PRs run affected-scoped; main re-verifies EVERYTHING (cheap via cache).
  # The turbo run summary is annotated onto the build either way, without
  # masking verify's exit code.
  - label: ":turborepo: verify"
    key: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      if [ "$BUILDKITE_BRANCH" = "main" ]; then SCOPE=""; else SCOPE="--affected"; fi
      set +e
      bun run verify -- $$SCOPE --filter='!sjer.red' --filter='!@shepherdjerred/resume' --concurrency=6 --output-logs=errors-only --summarize
      verify_status=$?
      set -e
      bun scripts/annotate-turbo-summary.ts
      exit "$$verify_status"
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Playwright e2e (PR + main) — browser-equipped container, bun installed
  # the same way the old CI's playwright step did. Browser-based test:e2e
  # members only; docker-compose e2e runs in the docker e2e step below.
  - label: ":performing_arts: playwright e2e"
    key: e2e
    command: |
      apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip
      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
      export PATH="/root/.bun/bin:$PATH"
      bun install --frozen-lockfile
      # Install the browser builds for the REPO-resolved playwright (run from
      # the package so bunx uses its dependency, not a downloaded latest):
      # chromium + headless-shell + webkit (the suite runs Mobile Safari).
      cd packages/sjer.red && bunx playwright install && cd ../..
      bunx turbo run build typecheck lint test test:e2e --filter=sjer.red --concurrency=2
    # The deploy-sites step ships this dist: sjer.red's build needs playwright
    # browsers (rehype-mermaid renders diagrams at build time), which only
    # exist in this container — build 5636 failed rebuilding it in ci-base.
    artifact_paths: "packages/sjer.red/dist/**/*"
    retry: *retry
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=mcr.microsoft.com/playwright
                image: "mcr.microsoft.com/playwright:v1.61.1-noble"
                resources:
                  requests: { cpu: "2", memory: "4Gi" }
                  limits: { cpu: "4", memory: "8Gi" }
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  # ── Resume build (PR + main) — xelatex needs a full TeX distribution; the
  # old CI used the texlive/texlive container for exactly this. Excluded from
  # the verify pod (--filter='!@shepherdjerred/resume').
  - label: ":scroll: resume build"
    key: resume-build
    command: |
      apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip curl
      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
      # The agent constructs its own PATH; re-add the texlive bin dir.
      export PATH="/root/.bun/bin:$(dirname "$(find /usr/local/texlive -name xelatex | head -1)"):$PATH"
      bun install --frozen-lockfile
      bunx turbo run build --filter='@shepherdjerred/resume'
    retry: *retry
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--no-tags"
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                # renovate: datasource=docker depName=texlive/texlive
                image: "texlive/texlive:TL2024-historic"
                resources:
                  requests: { cpu: "1", memory: "2Gi" }
                  limits: { cpu: "2", memory: "4Gi" }
                envFrom:
                  - secretRef: { name: buildkite-ci-secrets }

  # ── Docker-compose e2e (PR + main) — llm-observability spins up a compose
  # stack; needs the privileged pod's docker, not a browser container.
  - label: ":docker: docker e2e"
    key: docker-e2e
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      bunx turbo run test:e2e --filter='@shepherdjerred/llm-observability'
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Soft-fail lane (parallel with everything) ─────────────────────────────
  - label: ":shield: trivy"
    soft_fail: true
    command: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 .
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=1"
          podSpecPatch:
            containers:
              - name: container-0
                image: "aquasec/trivy:latest"
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }
                  limits: { cpu: "2", memory: "4Gi" }

  - label: ":mag: semgrep"
    soft_fail: true
    command: semgrep scan --config auto --error .
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=1"
          podSpecPatch:
            containers:
              - name: container-0
                image: "semgrep/semgrep:latest"
                resources:
                  requests: { cpu: "500m", memory: "1Gi" }
                  limits: { cpu: "2", memory: "4Gi" }

  - label: ":robot_face: greptile review gate"
    if: build.branch != pipeline.default_branch
    soft_fail: true
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun scripts/wait-for-greptile.ts
    plugins:
      - *pod

  # ── PR-only dry-run lane: validate every deploy path, no side effects ─────
  # (the old pipeline's --dryrun plumbing, restored)
  - label: ":terraform: tofu plan"
    if: build.branch != pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      export AWS_ACCESS_KEY_ID="$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$SEAWEEDFS_SECRET_ACCESS_KEY"
      for stack in seaweedfs tailscale buildkite arr pagerduty github cloudflare; do
        bun packages/homelab/scripts/tofu-stack.ts "$$stack" plan
      done
    retry: *retry
    plugins:
      - *pod

  - label: ":docker: images — build + smoke (PR dry-run)"
    if: build.branch != pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      # Images build + smoke. Registry layer cache is read via the per-image
      # --cache-from baked into each docker:build script (read-only on PRs —
      # only main's push script adds --cache-to). The three nested-package
      # families run unconditionally (turbo's nested --affected
      # under-selection bug — same workaround as the native shims). No push.
      # --concurrency=1: serial per image, same as main's push script —
      # parallel builds through the one dind sidecar contend on network, and
      # native-prebuild downloads inside `bun install` time out (build 5629:
      # a different image's node-datachannel prebuild timed out each attempt).
      bunx turbo run smoke --affected --concurrency=1
      bunx turbo run smoke --filter='@discord-plays-pokemon/backend' --filter='@discord-plays-mario-kart/backend' --filter='@scout-for-lol/backend' --concurrency=1
    retry: *retry
    plugins:
      - *pod_privileged

  - label: ":rocket: sites + helm + release (PR dry-run)"
    if: build.branch != pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      for site in sjer.red resume webring cooklang-rich-preview stocks-sjer-red scout-frontend scout-frontend-beta better-skill-capped glitter; do
        bun scripts/deploy-site.ts "$$site" --dry-run
      done
      bun packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER" --dry-run
      bun scripts/release.ts --dry-run
    retry: *retry
    plugins:
      - *pod

  # ── Main-only: images (build + smoke + push, serial per image) ───────────
  - label: ":docker: images — build, smoke, push"
    key: images
    if: build.branch == pipeline.default_branch
    depends_on: verify
    concurrency: 1
    concurrency_group: monorepo/image-push
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bun install --frozen-lockfile
      bash .buildkite/scripts/build-smoke-push-all.sh
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Main-only: static sites ───────────────────────────────────────────────
  - label: ":rocket: deploy sites"
    key: sites
    if: build.branch == pipeline.default_branch
    depends_on: [verify, e2e]
    concurrency: 1
    concurrency_group: monorepo/site-deploys
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      # Site syncs push to SeaweedFS S3 — same credential mapping as the
      # tofu steps (the secret exposes SEAWEEDFS_*, the AWS CLI wants AWS_*).
      export AWS_ACCESS_KEY_ID="$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$SEAWEEDFS_SECRET_ACCESS_KEY"
      # Pods are ephemeral: site buildCmds import workspace library dists
      # (sjer.red → astro-opengraph-images/webring, scout → data/ui) that
      # only existed in the verify pod. Build the graph here first — same
      # exclusions as verify; the sites' own builds run via deploy-site.ts
      # with their deploy env (build 5633: sjer.red failed to resolve the
      # unbuilt astro-opengraph-images entry).
      bunx turbo run build --filter='!sjer.red' --filter='!@shepherdjerred/resume' --concurrency=6 --output-logs=errors-only
      # sjer.red can't build here (rehype-mermaid needs playwright browsers,
      # build 5636) — the e2e step builds it in the playwright container and
      # ships the dist as a build artifact; deploy it prebuilt.
      buildkite-agent artifact download "packages/sjer.red/dist/**/*" . --step e2e
      bun scripts/deploy-site.ts sjer.red --prebuilt
      for site in resume webring cooklang-rich-preview stocks-sjer-red scout-frontend scout-frontend-beta better-skill-capped glitter; do
        bun scripts/deploy-site.ts "$$site"
      done
    retry: *retry
    plugins:
      - *pod

  # ── Main-only: npm publishes ──────────────────────────────────────────────
  - label: ":npm: publish packages"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun run --cwd packages/astro-opengraph-images publish:npm
      bun run --cwd packages/webring publish:npm
      bun run --cwd packages/homelab/src/helm-types publish:npm
    retry: *retry
    plugins:
      - *pod

  # ── Main-only: homelab release track ─────────────────────────────────────
  - label: ":helm: helm push"
    key: helm-push
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/helm-push.ts "$BUILDKITE_BUILD_NUMBER"
    retry: *retry
    plugins:
      - *pod

  - label: ":terraform: tofu apply (infra stacks)"
    key: tofu-apply
    if: build.branch == pipeline.default_branch
    depends_on: [verify, helm-push]
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      export AWS_ACCESS_KEY_ID="$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$SEAWEEDFS_SECRET_ACCESS_KEY"
      for stack in seaweedfs tailscale buildkite arr pagerduty; do
        bun packages/homelab/scripts/tofu-stack.ts "$$stack" apply
      done
    retry: *retry
    plugins:
      - *pod

  - label: ":terraform: tofu apply (github)"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    concurrency: 1
    concurrency_group: monorepo/tofu-github
    # No automatic retry: GitHub API mutations are not idempotent on partial
    # failure (same policy as the old pipeline).
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      export AWS_ACCESS_KEY_ID="$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun packages/homelab/scripts/tofu-stack.ts github apply
    plugins:
      - *pod

  - label: ":argo: sync + wait"
    key: argocd-sync
    if: build.branch == pipeline.default_branch
    depends_on: [images, helm-push, tofu-apply]
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/argocd.ts sync apps
      bun packages/homelab/scripts/argocd.ts health-wait apps --timeout 300
    retry: *retry
    plugins:
      - *pod

  - label: ":terraform: tofu apply (cloudflare, after tunnel gate)"
    if: build.branch == pipeline.default_branch
    depends_on: argocd-sync
    concurrency: 1
    concurrency_group: monorepo/tofu-cloudflare
    # Fail-closed: the SeaweedFS TunnelBinding finalizer must complete before
    # the Cloudflare DNS tunnel route is removed (same gate as the old CI).
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun packages/homelab/scripts/argocd.ts wait-deletion apps --group networking.cfargotunnel.com --version v1alpha1 --kind TunnelBinding --namespace seaweedfs --timeout 120
      export AWS_ACCESS_KEY_ID="$SEAWEEDFS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$SEAWEEDFS_SECRET_ACCESS_KEY"
      bun packages/homelab/scripts/tofu-stack.ts cloudflare apply
    plugins:
      - *pod

  # ── Main-only: release automation ─────────────────────────────────────────
  - label: ":package: release-please + version commit-back"
    if: build.branch == pipeline.default_branch
    depends_on: [images, sites]
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun scripts/release.ts
      bun scripts/update-versions.ts
    plugins:
      - *pod

  # ── Main-only: cooklang Obsidian plugin release ───────────────────────────
  # Publishes to the plugin repo + commits the version back (idempotent: the
  # script skips the release cut when the version tag already exists).
  - label: ":knife_fork_plate: cooklang plugin publish"
    if: build.branch == pipeline.default_branch
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      bun install --frozen-lockfile
      bun run --cwd packages/cooklang-for-obsidian publish:plugin
    plugins:
      - *pod

  # ── Toolchain image refresh ───────────────────────────────────────────────
  # TEMPORARY branch clause: the registry's ci-base:latest predates this
  # pipeline (Dagger-era), so this branch bakes the first real image itself.
  # Drop the feature/ci-parity clause after merge.
  - label: ":docker: ci-image refresh"
    if: build.branch == pipeline.default_branch || build.branch == "feature/ci-parity"
    depends_on: verify
    command: |
      . .buildkite/scripts/toolchain.sh
      . .buildkite/scripts/docker-env.sh
      bash .buildkite/scripts/build-ci-image.sh
    retry: *retry
    plugins:
      - *pod_privileged

  # ── Main-only: build summary annotation (runs even when deploys fail) ─────
  - label: ":memo: build summary"
    if: build.branch == pipeline.default_branch
    depends_on:
      - verify
      - e2e
      - docker-e2e
      - images
      - sites
      - helm-push
      - tofu-apply
      - argocd-sync
    allow_dependency_failure: true
    command: bash .buildkite/scripts/annotate-build-summary.sh
    plugins:
      - *pod
