line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 250
  error: 400

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 40
  error: 80

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i

excluded:
  - .build
  - Package.swift
  - QuickTip.xcodeproj
