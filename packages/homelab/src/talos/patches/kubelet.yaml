# Kubelet node-resource reservations for the single-node torvalds cluster.
#
# IMPORTANT — mechanism: reservations live under `extraConfig` (a
# KubeletConfiguration override that Talos deep-merges into the generated kubelet
# config), NOT under `extraArgs`. From 2026-03-18 (commit c649ada3d) until
# 2026-07-05 these were set as `--system-reserved` / `--eviction-hard` *flags* in
# extraArgs and never took effect: a live `talosctl get machineconfig` showed only
# `max-pods` present, with kubelet running on defaults (systemReserved=512Mi,
# evictionHard.memory.available=100Mi). That left ~all 125 GiB of RAM pod-
# allocatable, so CI pods + the ZFS ARC could oversubscribe RAM and hard-freeze the
# node. KubeletConfiguration is the canonical, reliably-applied form.
# See packages/docs/logs/2026-07-05_torvalds-ci-freeze-investigation.md.
machine:
  kubelet:
    extraArgs:
      max-pods: "300"
    extraConfig:
      # system-reserved must cover everything OUTSIDE the kubepods cgroup: the ZFS
      # ARC (zfs_arc_max = 16 GiB, see talos/patches/zfs.yaml) plus host kernel / OS
      # / kubelet / containerd / apid / etcd overhead (~8 GiB). These amounts are
      # always subtracted from node allocatable (kubelet accounts for
      # systemReserved/kubeReserved regardless of enforceNodeAllocatable), and as
      # of 2026-07-10 are also *hard cgroup ceilings* via enforceNodeAllocatable +
      # the *ReservedCgroup paths below (the /system ceiling tracks this value;
      # the ARC itself is kernel memory capped separately by zfs_arc_max, not by
      # the cgroup).
      #
      # 24Gi = 16 ARC + 8 OS overhead. Right-sized from 56Gi (48 ARC + 8) on
      # 2026-07-10: 30d evidence showed the 48Gi ARC massively oversized (hit rate
      # p50 99.95%, ghost hits p95 ~580/s) while pod requests hit 99.99% of the
      # 59.4Gi allocatable and CI pods went unschedulable. Allocatable is now
      # ~91.4Gi. If ZfsArcHitRateLow fires sustained, raise zfs_arc_max and this
      # value in lockstep. See
      # packages/docs/plans/2026-07-10_torvalds-memory-rightsize.md.
      systemReserved:
        cpu: "4"
        memory: "24Gi"
      # /system — Talos's CgroupSystem: every non-Kubernetes Talos daemon (udevd,
      # apid, trustd, extensions, dashboard, the system-level containerd) runs
      # here. Sourced from siderolabs/talos `pkg/machinery/constants/constants.go`
      # and confirmed via a live default-kubelet startup log showing Talos already
      # sets kubelet's own `SystemCgroupsName: "/system"` by default.
      systemReservedCgroup: /system
      # 8Gi, NOT 2Gi: the 2026-07-10 rollout enforced this as a hard ceiling at
      # 2Gi, but /podruntime's real usage is >2Gi (the Kubernetes containerd at
      # /podruntime/runtime alone was measured at ~1.65Gi, plus kubelet + etcd).
      # The kernel memcg-OOM-killed containerd/etcd/kubelet in a loop, the
      # (also newly enabled) hardware watchdog rebooted the node, and the
      # kube-apiserver stayed down until the ceiling was raised to 8Gi live on
      # 2026-07-11 (usage immediately settled at ~2.2Gi). If this ever needs
      # resizing again, measure /sys/fs/cgroup/podruntime/memory.peak first.
      # See packages/docs/logs/2026-07-10_torvalds-podruntime-oom-outage.md.
      kubeReserved:
        cpu: "1"
        memory: "8Gi"
      # /podruntime — Talos's CgroupPodRuntimeRoot: covers kubelet
      # (/podruntime/kubelet), the Kubernetes-scoped containerd runtime
      # (/podruntime/runtime), and etcd (/podruntime/etcd) — the parent cgroup
      # covering both kubelet and the container runtime, per upstream Kubernetes'
      # own guidance for what kube-reserved-cgroup should scope.
      kubeReservedCgroup: /podruntime
      evictionHard:
        memory.available: "2Gi"
        nodefs.available: "10%"
      evictionSoft:
        memory.available: "4Gi"
        nodefs.available: "15%"
      evictionSoftGracePeriod:
        memory.available: "2m"
        nodefs.available: "2m"
      # 2026-07 CI-freeze hardening. podPidsLimit: cluster-wide (single node, so
      # effectively node-wide — Kubernetes has no per-pod override) cgroup
      # pids.max cap. 4096 is the standard Kubernetes-documented default for
      # clusters that set this field (more restrictive CIS-hardening guidance of
      # 1024 targets adversarial multi-tenant threat models, not this
      # single-trusted-workload homelab). Must accommodate the Dagger engine's
      # own legitimate multi-process needs, not just an average pod — the
      # freeze investigation observed the engine's own goroutine count explode
      # 24 -> 1164 in under 60s; 4096 sits well above any plausible legitimate
      # footprint while still being a hard, finite ceiling instead of unbounded.
      # Verify PID headroom under real heavy-concurrency load before trusting
      # this value; watch for PIDPressure node conditions after rollout.
      #
      # enforceNodeAllocatable: real cgroup ceilings for system-reserved and
      # kube-reserved, not just accounting. 2026-07-09 first attempted this
      # without the *ReservedCgroup fields above — kubelet refuses to start in
      # that case (exit code 1, "systemReservedCgroup ... must be specified when
      # \"system-reserved\" ... included in enforceNodeAllocatable"), which
      # crash-looped the node on every boot until reverted. Fixed 2026-07-10 by
      # adding the cgroup paths above (sourced from Talos's own constants, not
      # guessed) and live-verified working: kubelet came up Running/OK
      # immediately, and the resulting cgroup limits matched exactly (see comment
      # above). See packages/docs/logs/2026-07-08_torvalds-cluster-health-deep-check.md,
      # packages/docs/logs/2026-07-10_torvalds-kubelet-crashloop.md, and
      # packages/docs/plans/2026-07-10_torvalds-kubelet-cgroup-enforcement.md.
      podPidsLimit: 4096
      enforceNodeAllocatable:
        - pods
        - system-reserved
        - kube-reserved
