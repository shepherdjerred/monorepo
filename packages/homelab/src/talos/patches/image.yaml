machine:
  install:
    # https://factory.talos.dev/
    # Image ID generated from image.yaml schematic - includes extraKernelArgs for SecureBoot.
    # Renovate (regex manager in renovate.json) tracks the trailing :vX.Y.Z; the schematic
    # hash before the colon is regenerated by packages/homelab/src/talos/update-image-id.ts
    # after a Talos version bump.
    image: factory.talos.dev/metal-installer-secureboot/4560d31e3c529f9808e0898c2804d25be14201992fe2792abd4a09618e0d39a9:v1.13.5@sha256:2dfcf28061e5e474bdc029e3ce21a960aef3c1cebe3c873cf9cc528e6b3b49d8
    # Select the install disk by serial, never by /dev path: torvalds has two identical
    # Samsung 990 PRO 4TB NVMes and the kernel assigns nvme0n1/nvme1n1 randomly per boot
    # (observed flipping 2026-05/06). The other drive (S7KGNU0X511734N) holds the
    # zfspv-pool-nvme ZFS pool backing all zfs-ssd PVCs — with wipe:true, a path-based
    # selector would destroy it on a reinstall whenever the coin flip goes the wrong way.
    diskSelector:
      serial: S7KGNU0XB15590B
    wipe: true
  sysfs:
    # RAPL power limits for i9-14900K (PL1=125W, PL2=253W)
    devices.virtual.powercap.intel-rapl.intel-rapl:0.constraint_0_power_limit_uw: "125000000"
    devices.virtual.powercap.intel-rapl.intel-rapl:0.constraint_1_power_limit_uw: "253000000"
    # ZFS ARC tuning for 128GB RAM system
    # Use 50% of total RAM to leave headroom for k8s workloads while reducing
    # hash-collision spikes under metadata-heavy ZFS load.
    # Max ARC size: 62.5 GiB
    module.zfs.parameters.zfs_arc_max: "67108864000"
    # Min ARC size: 8GB (ensures cache isn't starved during memory pressure)
    module.zfs.parameters.zfs_arc_min: "8589934592"
    # Favor metadata in ARC (default 500, higher = more metadata)
    # Workload is metadata-heavy (many snapshots/small files)
    module.zfs.parameters.zfs_arc_meta_balance: "750"
    # Increase prefetch limit for sequential reads (default 10)
    module.zfs.parameters.zfs_prefetch_disable: "0"
    # Enable compressed ARC (stores compressed data in ARC, saves memory)
    module.zfs.parameters.zfs_compressed_arc_enabled: "1"
    # Tune L2ARC (if you have an SSD cache device)
    # Write boost on empty L2ARC (faster warmup)
    module.zfs.parameters.l2arc_noprefetch: "0"
  network:
    hostname: torvalds
  kernel:
    modules:
      - name: i915
      - name: zfs
