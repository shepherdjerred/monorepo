agents:
  queue: default

steps:
  - label: ":pipeline: Generate Pipeline"
    # The bootstrap pipeline-upload step is the only BK pod that still
    # checks out the repo. It runs `bun src/main.ts` against the local
    # working tree to compute the dynamic pipeline (change-detection +
    # step generation). Every step it emits skips checkout and lets
    # Dagger fetch source via git-URL refs instead — see
    # packages/docs/plans/2026-05-31_bk-dagger-git-url-refactor.md.
    command: .buildkite/scripts/generate-pipeline.sh
    plugins:
      - kubernetes:
          checkout:
            cloneFlags: "--depth=100"
            fetchFlags: --depth=100
          podSpecPatch:
            serviceAccountName: buildkite-agent-stack-k8s-controller
            containers:
              - name: container-0
                image: "ghcr.io/shepherdjerred/ci-base:406"
                resources:
                  requests:
                    cpu: "250m"
                    memory: "512Mi"
                envFrom:
                  - secretRef:
                      name: buildkite-ci-secrets
                  - secretRef:
                      name: buildkite-argocd-token
                      optional: true
                volumeMounts:
                  - name: buildkite-git-mirrors
                    mountPath: /buildkite/git-mirrors
                    readOnly: true
