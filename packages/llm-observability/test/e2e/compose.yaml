name: llm-obs-e2e
services:
  tempo:
    image: grafana/tempo:2.10.6@sha256:6ea351a2186822a044d5e326ed4c7a43d019378e4c033c271b89584216db03e7
    command: ["-config.file=/etc/tempo.yaml"]
    # `configs` ships the file CONTENT through the compose API instead of a
    # host bind mount — required in CI, where the docker daemon is a dind
    # sidecar that cannot see this container's checkout.
    configs:
      - source: tempo_config
        target: /etc/tempo.yaml
    volumes:
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    # No healthcheck: the tempo image is distroless (no shell, no wget — an
    # exec-form check can never pass). run.sh polls /ready from the host.

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z@sha256:8834ae47a2de3509b83e0e70da9369c24bbbc22de42f2a2eddc530eee88acd1b
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      retries: 30
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2025-04-03T17-07-56Z@sha256:69fb6e6ca209008ae3cacf9f63c2524f68a1322dc921c8992ba2cc99c5bef3c6
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/llm-archive
      "
    restart: "no"

configs:
  tempo_config:
    # Inline content (not `file:`): compose implements `file:` configs as
    # bind mounts, which CI's dind daemon cannot resolve. Keep in sync with
    # ./tempo.yaml (kept for local tooling/reference).
    content: |
      stream_over_http_enabled: true
      server:
        http_listen_port: 3200
        log_level: info
      distributor:
        receivers:
          otlp:
            protocols:
              http:
                endpoint: "0.0.0.0:4318"
              grpc:
                endpoint: "0.0.0.0:4317"
      ingester:
        max_block_duration: 5m
        complete_block_timeout: 10s
        trace_idle_period: 1s
      compactor:
        compaction:
          block_retention: 1h
      storage:
        trace:
          backend: local
          wal:
            path: /var/tempo/wal
          local:
            path: /var/tempo/blocks
      overrides:
        defaults:
          metrics_generator:
            processors: []

volumes:
  tempo-data: {}
  minio-data: {}
